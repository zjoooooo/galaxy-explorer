<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Milky Way Galaxy</title>
<style>
  :root { color-scheme: dark; }
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; background: #03040a; color: #e5e7eb;
    font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif; overflow: hidden;
    user-select: none; -webkit-user-select: none; }
  #cv { display: block; width: 100vw; height: 100vh; }

  .overlay { position: fixed; z-index: 5; }
  #title { top: 14px; left: 18px; font-size: 15px; font-weight: 600; pointer-events: none; }
  #title small { display: block; font-size: 11px; color: #6b7280; font-weight: 400; margin-top: 2px; }
  #msg { top: 50%; left: 50%; transform: translate(-50%,-50%); font-size: 13px; color: #9ca3af; pointer-events: none; }

  /* cinema mode (F): hide all UI chrome */
  body.gx-cinema #title, body.gx-cinema #audio, body.gx-cinema #beacons, body.gx-cinema #lang,
  body.gx-cinema #skyback, body.gx-cinema #skylabels { display: none !important; }

  /* language selector (native <select>, dark) */
  #lang { top: 12px; right: 14px; z-index: 6; font: inherit; font-size: 12px; color: #cbd5e1;
    background: rgba(10,14,24,.72); border: 1px solid #243049; border-radius: 8px; padding: 5px 8px; cursor: pointer; }
  #lang:hover { border-color: #6366f1; }

  /* sky view: back-to-galaxy button */
  #skyback { top: 64px; left: 18px; z-index: 6; display: none; cursor: pointer; font-size: 13px;
    color: #cbd5e1; background: rgba(10,14,24,.72); border: 1px solid #243049; border-radius: 8px; padding: 6px 12px; }
  #skyback:hover { border-color: #6366f1; color: #fff; }
  #skylabels { position: absolute; inset: 0; z-index: 4; pointer-events: none; }
  .skylabel { position: absolute; transform: translate(-50%, -50%); pointer-events: auto; cursor: pointer;
    font-size: 13px; letter-spacing: .08em; color: #cfe0ff; white-space: nowrap; text-align: center;
    text-shadow: 0 1px 3px rgba(0,0,0,.9), 0 0 10px rgba(120,170,255,.45); transition: opacity .2s ease; }
  .skylabel small { display: block; font-size: 10px; color: #8fa3c8; letter-spacing: .12em; }
  .skylabel.dim { opacity: .35; }
  .skylabel.sel { color: #fff; text-shadow: 0 1px 3px rgba(0,0,0,.9), 0 0 14px rgba(150,190,255,.9); }

  /* location beacons: borderless glow-dot + pulse rings + floating label (no boxes, no borders) */
  /* absolute (not fixed): under Safari pinch/page-zoom, fixed layers detach from the
     canvas while absolute ones transform with the content and stay glued to the galaxy */
  #beacons { position: absolute; inset: 0; z-index: 4; pointer-events: none; }
  .beacon { position: absolute; --bc: #8fc2ff; text-align: center; transform: translate(-50%, -7px);
    display: flex; flex-direction: column; align-items: center; gap: 6px; }
  .beacon.up { flex-direction: column-reverse; transform: translate(-50%, calc(-100% + 7px)); } /* label above the dot — avoids pile-ups in the crowded solar neighbourhood */
  .b-mark { position: relative; width: 14px; height: 14px; margin: 0 auto; }
  .b-dot { position: absolute; inset: 2px; border-radius: 50%;
    background: radial-gradient(circle, #fff 0%, var(--bc) 55%, transparent 78%);
    box-shadow: 0 0 10px 2px var(--bc); }
  .b-ring { position: absolute; inset: 0; border-radius: 50%; opacity: 0;
    box-shadow: 0 0 6px 1px var(--bc), inset 0 0 6px 1px var(--bc);
    animation: bping 3.2s cubic-bezier(.2, .6, .4, 1) infinite; }
  .b-ring.r2 { animation-delay: 1.6s; }
  @keyframes bping { 0% { transform: scale(.35); opacity: .85; } 75% { opacity: .15; } 100% { transform: scale(3); opacity: 0; } }
  .b-label { font-size: 12px; letter-spacing: .06em; color: #dfeaff; white-space: nowrap;
    text-shadow: 0 1px 3px rgba(0,0,0,.9), 0 0 10px rgba(120,170,255,.5); }
  .b-label small { display: block; font-size: 9.5px; letter-spacing: .05em; color: #93a5c4; margin-top: 1px; }
  .beacon.sun { --bc: #ffd27a; }
  .beacon.ext { --bc: #d9a6ff; } /* external galaxies — violet, signals "beyond the Milky Way" */
  .beacon.sun .b-dot { inset: 1px; }
  .beacon.sun .b-label { color: #ffe9c2; text-shadow: 0 1px 3px rgba(0,0,0,.9), 0 0 12px rgba(255,200,110,.6); }
  .beacon.sun .b-label small { color: #c8ab7d; }
  /* interaction: only the mark + label catch clicks (container stays none) */
  .beacon .b-mark, .beacon .b-label { pointer-events: auto; cursor: pointer; }
  .beacon .b-mark { transition: transform .15s ease; }
  .beacon.dim { opacity: .45; transition: opacity .2s ease; }
  .beacon:hover .b-mark { transform: scale(1.25); }
  .beacon.sel .b-mark { transform: scale(1.5); }
  .beacon.sel .b-dot { box-shadow: 0 0 16px 4px var(--bc); }
  .beacon.sel .b-label { color: #fff; }
  /* label declutter: crowded labels hide (dot + rings stay clickable); they return on zoom-in */
  .beacon .b-label { transition: opacity .25s ease; }
  .beacon.ld .b-label { opacity: 0; }
  /* decluttered beacons don't intercept clicks — the kept "winner" of each crowded
     cluster (the Solar System is always kept) takes the click; zoom in to reach the rest */
  .beacon.ld .b-mark, .beacon.ld .b-label { pointer-events: none; }
  /* narrow / touch screens: shrink beacons and drop the English subtitle so the
     crowded solar neighbourhood doesn't pile up. ponytail: eases overlap, not a
     full collision solver (that'd need label de-clustering — see task 6). */
  @media (max-width: 640px) {
    .b-mark { width: 11px; height: 11px; }
    .b-label { font-size: 10px; letter-spacing: .02em; }
    .b-label small { display: none; }
  }
  /* beacon info panel — desktop: fixed right side */
  #beacon-panel { top: 74px; right: 14px; width: 300px; max-height: calc(100vh - 96px); overflow-y: auto;
    z-index: 7; background: rgba(10,14,24,.92); border-radius: 12px; padding: 16px 18px 18px;
    color: #e5e7eb; box-shadow: 0 8px 30px rgba(0,0,0,.5); display: none; }
  #beacon-panel.open { display: block; animation: bpIn .18s ease; }
  @keyframes bpIn { from { opacity: 0; transform: translateY(-6px); } to { opacity: 1; transform: none; } }
  #bp-close { position: absolute; top: 8px; right: 10px; background: transparent; border: 0; color: #9ca3af;
    font-size: 20px; line-height: 1; cursor: pointer; padding: 2px 6px; }
  #bp-close:hover { color: #fff; }
  #bp-name { font-size: 18px; font-weight: 600; margin: 0 20px 6px 0; }
  #bp-type { display: inline-block; font-size: 11px; letter-spacing: .04em; padding: 2px 8px; border-radius: 999px;
    background: rgba(255,255,255,.08); color: #cbd5e1; margin-bottom: 10px; }
  .bp-row { display: flex; justify-content: space-between; gap: 12px; font-size: 12.5px; padding: 4px 0;
    border-top: 1px solid rgba(255,255,255,.07); }
  .bp-row .k { color: #93a5c4; } .bp-row .v { color: #e5e7eb; text-align: right; }
  #bp-desc { font-size: 13px; line-height: 1.55; color: #cbd5e1; margin-top: 10px; }
  #bp-cat { font-size: 10.5px; color: #6b7280; margin-top: 10px; }
  #bp-img { display: block; width: 100%; height: 150px; object-fit: cover; border-radius: 8px;
    margin: 10px 0 3px; background: rgba(255,255,255,.04); }
  #bp-credit { font-size: 9px; line-height: 1.35; color: #5b6578; margin-bottom: 6px; }
  #bp-zodiac-link, #bp-flyto { margin-top: 12px; padding-top: 10px; border-top: 1px solid rgba(255,255,255,.07);
    color: #9cc0ff; cursor: pointer; font-size: 13px; }
  #bp-zodiac-link:hover, #bp-flyto:hover { color: #cfe2ff; }
  #return-mw { position: fixed; top: 16px; left: 50%; transform: translateX(-50%); z-index: 50; display: none;
    padding: 8px 16px; border-radius: 20px; cursor: pointer; background: rgba(20,26,40,.72);
    border: 1px solid rgba(255,255,255,.14); color: #cfe0ff; font-size: 13px; -webkit-backdrop-filter: blur(6px); backdrop-filter: blur(6px); }
  #return-mw:hover { background: rgba(30,40,60,.85); color: #fff; }
  #scan-btn { position: fixed; top: 16px; left: 50%; transform: translateX(calc(-50% + 150px)); z-index: 50; display: none;
    padding: 8px 16px; border-radius: 20px; cursor: pointer; background: rgba(20,40,60,.72);
    border: 1px solid rgba(120,200,255,.3); color: #bfe6ff; font-size: 13px; -webkit-backdrop-filter: blur(6px); backdrop-filter: blur(6px); }
  #scan-btn:hover { background: rgba(30,60,90,.9); color: #fff; }
  #scan-line { position: fixed; left: 0; width: 100%; height: 2px; z-index: 45; display: none; pointer-events: none;
    background: linear-gradient(90deg, transparent, #7fd0ff, #eaf8ff, #7fd0ff, transparent);
    box-shadow: 0 0 18px 4px rgba(120,208,255,.55); }
  .detect-ring { position: fixed; z-index: 46; pointer-events: none; border: 2px solid rgba(150,225,255,.9); border-radius: 50%; }
  body.gx-cinema #beacon-panel { display: none !important; }
  /* mobile: panel becomes a bottom drawer */
  @media (max-width: 640px) {
    #beacon-panel { top: auto; bottom: 0; right: 0; left: 0; width: auto; max-height: 52vh;
      border-radius: 14px 14px 0 0; padding: 14px 16px 18px; }
    #beacon-panel.open { animation: bpUp .2s ease; }
    @keyframes bpUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: none; } }
  }

  /* background-music control: speaker button + a hover popup listing tracks by name */
  #audio { right: 16px; bottom: 14px; z-index: 6; text-align: right; }
  #audiobtn { display: inline-block; cursor: pointer; font-size: 18px; line-height: 1; background: transparent;
    border: 1px solid transparent; border-radius: 8px; padding: 7px 9px; user-select: none; opacity: .8; }
  #audiobtn:hover { border-color: #6366f1; background: rgba(8,12,22,.6); opacity: 1; }
  #audiolist { display: none; margin-bottom: 6px; background: rgba(10,14,24,.95); border: 1px solid #243049;
    border-radius: 8px; overflow: hidden; }
  #audio:hover #audiolist { display: block; }
  #audiolist .a-track { padding: 6px 12px; font-size: 12px; color: #cbd5e1; cursor: pointer; white-space: nowrap; text-align: left; }
  #audiolist .a-track:hover { background: #161f31; }
  #audiolist .a-track.on { color: #34d399; }
</style>
</head>
<body>
<canvas id="cv"></canvas>

<div id="title" class="overlay">Milky Way Galaxy
  <small>drag to orbit · scroll to zoom · F cinema · M music</small></div>

<select id="lang" class="overlay" title="Language">
  <option value="en">English</option>
  <option value="hans">简体中文</option>
  <option value="hant">繁體中文</option>
  <option value="ja">日本語</option>
  <option value="ko">한국어</option>
</select>

<div id="skyback" class="overlay">← Back to Galaxy</div>

<div id="msg" class="overlay"></div>

<div id="beacon-panel" class="overlay" aria-live="polite">
  <button id="bp-close" title="Close" aria-label="Close">×</button>
  <div id="bp-body"></div>
</div>

<div id="audio" class="overlay">
  <div id="audiolist"></div>
  <div id="audiobtn" title="Background music — click to play / mute (M)">🔇</div>
</div>

<script src="vendor/three.min.js"></script>
<script src="vendor/OrbitControls.js"></script>
<script src="vendor/CopyShader.js"></script>
<script src="vendor/LuminosityHighPassShader.js"></script>
<script src="vendor/EffectComposer.js"></script>
<script src="vendor/RenderPass.js"></script>
<script src="vendor/ShaderPass.js"></script>
<script src="vendor/UnrealBloomPass.js"></script>
<script>
  // ── tunables (tweak to taste, then reload) ──────────────────────────────────
  // BLOOM: gentle selective glow (threshold 0.42 → only bright knots/core glow).
  //        strength 0 = off, ~0.05 subtle, ~0.12 strong.
  // DUST:  the whole spiral galaxy — 85k points on `arms` density-wave arms.
  //        `radius` = disc size, `tight` = winding, `brightness` = overall level.
  // GALAXY_SPIN: radians/sec the whole galaxy rotates about its axis.
  var BLOOM = { strength: 0.08, radius: 0.32, threshold: 0.42 };
  var TONE = { exposure: 1.1 };
  var DUST = { count: 85000, min: 1500, radius: 360, arms: 4, minorDim: 0.42, tight: 0.85, armWidth: 46, randomness: 0.5, thickness: 24, radPow: 0.72, size: 4.0, brightness: 0.5, inside: 0xffcf8a, outside: 0x86acec, hii: 0xff5fa8, blueStar: 0xcfe6ff };
  var GLOW_SIZE = 12, GALAXY_SPIN = 0.013;

  function setMsg(t) { var el = document.getElementById('msg'); if (el) el.textContent = t || ''; }

  // ── renderer / scene / bloom ────────────────────────────────────────────────
  var cv = document.getElementById('cv');
  var renderer = new THREE.WebGLRenderer({ canvas: cv, antialias: true });
  renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.toneMapping = THREE.NoToneMapping; // tone-mapped AFTER bloom via a final ACES pass instead
  var scene = new THREE.Scene();
  scene.fog = new THREE.FogExp2(0x03040a, 0.0012);
  // everything that co-rotates (dust + nebula + effects) lives under this group
  var galaxyRoot = new THREE.Group(); scene.add(galaxyRoot);
  var camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.5, 5000);
  camera.position.set(0, 390, 520); // elevated 3/4 top-down view, pulled back so the whole disc + deep-field neighbours frame with margin on load
  var controls = new THREE.OrbitControls(camera, renderer.domElement);
  controls.enableDamping = true; controls.dampingFactor = 0.08; controls.maxDistance = 1600; controls.minDistance = 5;

  // bloom composer (defensive: fall back to plain rendering if any global is missing)
  var composer = null;
  try {
    composer = new THREE.EffectComposer(renderer);
    composer.addPass(new THREE.RenderPass(scene, camera));
    composer.addPass(new THREE.UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), BLOOM.strength, BLOOM.radius, BLOOM.threshold));
    // tone-map AFTER bloom (ACES + gamma) so bright cores compress to colour instead of clipping to white
    composer.addPass(new THREE.ShaderPass({
      uniforms: { tDiffuse: { value: null }, uExposure: { value: TONE.exposure } },
      vertexShader: 'varying vec2 vUv; void main(){ vUv = uv; gl_Position = projectionMatrix * modelViewMatrix * vec4(position,1.0); }',
      fragmentShader: 'uniform sampler2D tDiffuse; uniform float uExposure; varying vec2 vUv;' +
        'vec3 aces(vec3 x){ return clamp((x*(2.51*x+0.03))/(x*(2.43*x+0.59)+0.14), 0.0, 1.0); }' +
        'void main(){ vec3 c = aces(texture2D(tDiffuse, vUv).rgb * uExposure); gl_FragColor = vec4(pow(c, vec3(1.0/2.2)), 1.0); }'
    }));
    composer.setSize(window.innerWidth, window.innerHeight);
  } catch (e) { composer = null; }
  function render() {
    if (composer) composer.render(); else renderer.render(scene, camera);
  }

  // glow point fragment shared by dust + planets
  var GLOW_FRAG = 'varying vec3 vColor; void main(){ float s = pow(max(0.0, 1.0 - distance(gl_PointCoord, vec2(0.5)) * 2.0), 2.0); if (s < 0.02) discard; gl_FragColor = vec4(vColor, s); }';
  // softer GAUSSIAN falloff for the gas — no hard disc edge, so dense points blend into a continuous nebula instead of visible circles

  // ── galactic-dust spiral backdrop (decorative; AUTO-FADES as real data grows) ──
  var dustObj = null, dustBuiltCount = -1;
  function buildDust(count) {
    if (dustObj) { galaxyRoot.remove(dustObj); dustObj.geometry.dispose(); dustObj.material.dispose(); dustObj = null; }
    var N = Math.max(0, count | 0);
    dustBuiltCount = N;
    if (N === 0) return;
    var pos = new Float32Array(N * 3), scl = new Float32Array(N), colA = new Float32Array(N * 3);
    var inside = new THREE.Color(DUST.inside), outside = new THREE.Color(DUST.outside), mix = new THREE.Color();
    // Stars CLUMP into irregular knots/associations along the arms (like the real Milky
    // Way — NOT a smooth uniform field). Seed cluster centres on the (weighted) arms, then
    // drop ~80% of stars as a gaussian blob around a centre + a sparse diffuse field.
    var TAU = 6.28318530718;
    function grand() { return Math.random() + Math.random() + Math.random() - 1.5; } // ~gaussian, range ±1.5
    function pickArm(r) { var idx = (Math.random() < 0.7) ? Math.floor(Math.random() * (DUST.arms / 2)) * 2 : Math.floor(Math.random() * (DUST.arms / 2)) * 2 + 1, maj = (idx % 2 === 0); return { maj: maj, ang: idx * (TAU / DUST.arms) + r * DUST.tight * TAU + (Math.random() - 0.5) * DUST.randomness * (maj ? 1.0 : 1.25) }; }
    var NC = Math.max(20, Math.round(N / 200)), clusters = []; // ~1 cluster per 200 stars
    for (var c = 0; c < NC; c++) {
      var crf = Math.pow(Math.random(), DUST.radPow), cp = pickArm(crf), cR = crf * DUST.radius + (Math.random() - 0.5) * DUST.armWidth;
      clusters.push({ x: Math.cos(cp.ang) * cR, z: Math.sin(cp.ang) * cR, rf: crf, maj: cp.maj, sz: 6 + Math.random() * Math.random() * 36 }); // mostly small knots, a few big associations
    }
    for (var i = 0; i < N; i++) {
      var rf, major;
      if (Math.random() < 0.8) {                                  // ~80% of stars CLUMP into a knot
        var k = clusters[(Math.random() * NC) | 0];
        rf = k.rf; major = k.maj;
        pos[i * 3] = k.x + grand() * k.sz; pos[i * 3 + 2] = k.z + grand() * k.sz;
        pos[i * 3 + 1] = grand() * DUST.thickness * ((1 - rf) + 0.2) * 0.45;
      } else {                                                    // ~20% diffuse field stars between the knots
        rf = Math.pow(Math.random(), DUST.radPow); var fp = pickArm(rf), offR = rf * DUST.radius + (Math.random() - 0.5) * DUST.armWidth;
        major = fp.maj;
        pos[i * 3] = Math.cos(fp.ang) * offR; pos[i * 3 + 2] = Math.sin(fp.ang) * offR;
        pos[i * 3 + 1] = (Math.random() - 0.5) * DUST.thickness * ((1 - rf) + 0.2);
      }
      mix.copy(inside).lerp(outside, Math.min(1, Math.max(0, (rf - 0.12) * 3.0))).multiplyScalar(DUST.brightness * (major ? 1.0 : DUST.minorDim) * (1 - 0.4 * Math.min(1, Math.max(0, (rf - 0.78) * 4.5)))); // blue-white arms (gold only in the inner disc) + minor arms dimmer + dim the outer edge
      scl[i] = (0.3 + Math.random() * 0.9) * (major ? 1.0 : 0.82);
      var kn = Math.random();                                            // scattered YELLOW giants + bright HII (pink) / hot blue-white clusters (HII+blue in the MAJOR arms)
      if (kn < 0.003) { mix.setHex(0xffd45a).multiplyScalar(DUST.brightness * 2.6); scl[i] = 1.4 + Math.random() * 1.2; }                              // bright YELLOW glowing stars (giants / globulars like Palomar 1), scattered everywhere
      else if (major && rf > 0.28 && kn < 0.024) { var cr = Math.random(), col = cr < 0.6 ? 0xff5e30 : (cr < 0.8 ? 0xcfe6ff : 0x4d8cff); mix.setHex(col).multiplyScalar(DUST.brightness * 2.3); scl[i] = 1.2 + Math.random() * 0.9; } // bright knot stars: 60% orange-red, 20% blue-white, 20% blue (was pink HII)
      else if (major && rf > 0.28 && kn < 0.103) { mix.setHex(DUST.blueStar).multiplyScalar(DUST.brightness * 2.0); scl[i] = 0.9 + Math.random() * 0.8; } // hot blue-white clusters
      colA[i * 3] = mix.r; colA[i * 3 + 1] = mix.g; colA[i * 3 + 2] = mix.b;
    }
    var g = new THREE.BufferGeometry();
    g.setAttribute('position', new THREE.BufferAttribute(pos, 3));
    g.setAttribute('aColor', new THREE.BufferAttribute(colA, 3));
    g.setAttribute('aScale', new THREE.BufferAttribute(scl, 1));
    var mat = new THREE.ShaderMaterial({
      uniforms: { uSize: { value: DUST.size * renderer.getPixelRatio() } },
      vertexShader: 'uniform float uSize; attribute float aScale; attribute vec3 aColor; varying vec3 vColor;' +
        'void main(){ vec4 mp = modelMatrix * vec4(position,1.0); vec4 vp = viewMatrix * mp; gl_Position = projectionMatrix * vp;' +
        ' gl_PointSize = uSize * aScale * (300.0 / -vp.z); vColor = aColor; }',
      fragmentShader: GLOW_FRAG,
      transparent: true, depthWrite: false, blending: THREE.AdditiveBlending
    });
    dustObj = new THREE.Points(g, mat); galaxyRoot.add(dustObj); // rotates with the galaxy
  }
  // dustFor: the current dust count, scaled down by the FPS watchdog on weak GPUs.
  function dustFor() { return Math.max(DUST.min, Math.round(DUST.count * perfScale)); }
  buildDust(DUST.count); // full dust on load

  // HII / reflection nebula clouds are now rendered IN the nebulaField shader as
  // gradient-coloured (deep-red ↔ blue-white) COHESIVE regions — no more separate
  // gaussian-point knots (those read as "一个一个小的高斯圆" / individual circles).

  // ── nebula gas as a CONTINUOUS SHADER FIELD (not point sprites) ──────────────
  // A flat disc in the galaxy plane whose fragment shader computes smooth fBm-noise
  // clouds modulated by the spiral — a fluid, water-like nebula that wraps the stars
  // with NO visible circles (point sprites always showed a disc edge). Rides galaxyRoot.
  var NEBULA = { inside: 0xffc878, outside: 0x5f93e8 }; // warm core ↔ cool arm gas colours
  var nebMat = null; // module-scope so the ?tune panel can adjust the glow uniforms live
  (function nebulaField() {
    var geo = new THREE.PlaneGeometry(DUST.radius * 2.6, DUST.radius * 2.6, 1, 1);
    nebMat = new THREE.ShaderMaterial({
      uniforms: {
        uR: { value: DUST.radius }, uArms: { value: DUST.arms }, uTight: { value: DUST.tight },
        uInside: { value: new THREE.Color(NEBULA.inside) }, uOutside: { value: new THREE.Color(NEBULA.outside) },
        uBright: { value: 0.28 }, uMinorDim: { value: DUST.minorDim },
        uCoreExp: { value: 6.0 }, uCoreStr: { value: 1.55 }, uCoreWhite: { value: 0.5 } // operator-tuned defaults
      },
      vertexShader: 'varying vec2 vP; void main(){ vP = position.xy; gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0); }',
      fragmentShader:
        'varying vec2 vP; uniform float uR; uniform float uArms; uniform float uTight; uniform vec3 uInside; uniform vec3 uOutside; uniform float uBright; uniform float uMinorDim; uniform float uCoreExp; uniform float uCoreStr; uniform float uCoreWhite;' +
        'float hash(vec2 p){ return fract(sin(dot(p, vec2(127.1, 311.7))) * 43758.5453); }' +

      { p: galPos(63.2, 13.7, 2.3),
        t: {"en":["Ring Nebula (M57)"],"hans":["环状星云（M57）"],"hant":["環狀星雲（M57）"],"ja":["環状星雲（M57）"],"ko":["고리 성운 (M57)"]},
        info: { en:{"type":"Planetary nebula","distance":"~2,300 light-years","constellation":"Lyra","facts":[["Shell age","~7,000 years"],["Central white dwarf","~100,000 K"]],"desc":"This glowing smoke ring is the outer shell of gas gently puffed off by a dying Sun-like star as it ran out of fuel — not the violent blast of a supernova, which only much heavier stars produce. The ring lights up because the star's exposed core, now a tiny, blistering-hot white dwarf near the center, floods it with ultraviolet radiation. It is the classic textbook planetary nebula, a preview of the fate awaiting our own Sun.","catalog":"M57"}, hans:{"type":"行星状星云","distance":"约 2,300 光年","constellation":"天琴座","facts":[["外壳年龄","约 7,000 年"],["中心白矮星","约 100,000 K"]],"desc":"这个发光的“烟圈”是一颗类太阳恒星在燃料耗尽、走向死亡时轻柔抛出的外层气壳，而不是超新星那样的猛烈爆发——后者只有质量大得多的恒星才会经历。星云之所以发光，是因为恒星裸露的内核如今变成中心一颗极其炽热的小白矮星，用紫外辐射照亮了它。这是教科书上经典的行星状星云，也预示着我们太阳未来的归宿。","catalog":"M57"}, hant:{"type":"行星狀星雲","distance":"約 2,300 光年","constellation":"天琴座","facts":[["外殼年齡","約 7,000 年"],["中心白矮星","約 100,000 K"]],"desc":"這個發光的「煙圈」是一顆類太陽恆星在燃料耗盡、邁向死亡時輕柔拋出的外層氣殼，而非超新星那樣的猛烈爆發——後者只有質量大得多的恆星才會經歷。星雲之所以發光，是因為恆星裸露的核心如今變成中心一顆極其熾熱的小白矮星，以紫外輻射照亮了它。這是教科書上經典的行星狀星雲，也預示著我們太陽未來的歸宿。","catalog":"M57"}, ja:{"type":"惑星状星雲","distance":"約2,300光年","constellation":"こと座","facts":[["外殻の年齢","約7,000年"],["中心の白色矮星","約100,000 K"]],"desc":"この輝く煙の輪は、太陽に似た星が燃料を使い果たして死を迎える際に静かに吹き出した外層のガス殻で、超新星のような激しい爆発ではありません——爆発ははるかに重い星だけが起こすものです。星雲が光るのは、むき出しになった星の芯が今や中心にある極めて高温の小さな白色矮星となり、紫外線でガスを照らしているからです。教科書に載る典型的な惑星状星雲であり、私たちの太陽が将来たどる運命の姿でもあります。","catalog":"M57"}, ko:{"type":"행성상성운","distance":"약 2,300광년","constellation":"거문고자리","facts":[["껍질 나이","약 7,000년"],["중심 백색왜성","약 100,000 K"]],"desc":"이 빛나는 연기 고리는 태양과 비슷한 별이 연료를 다 쓰고 죽어가며 부드럽게 벗어던진 바깥쪽 가스 껍질로, 훨씬 무거운 별만 겪는 초신성 폭발과는 다릅니다. 성운이 빛나는 까닭은 별의 드러난 중심핵이 이제 한가운데의 아주 뜨거운 작은 백색왜성이 되어 자외선으로 가스를 밝히기 때문입니다. 교과서에 나오는 전형적인 행성상성운이자, 우리 태양이 맞이할 미래의 모습이기도 합니다.","catalog":"M57"} } },
      { p: galPos(36.2, -57.1, 0.65),
        t: {"en":["Helix Nebula"],"hans":["螺旋星云"],"hant":["螺旋星雲"],"ja":["らせん星雲"],"ko":["나선 성운"]},
        info: { en:{"type":"Planetary nebula","distance":"~650 light-years","constellation":"Aquarius","facts":[["Nickname","Eye of God"],["Diameter","~2.5 light-years"]],"desc":"One of the closest planetary nebulae to Earth, the Helix is a nearby preview of how our own Sun will die. As a Sun-like star sheds its outer layers, it leaves nested glowing shells around a hot white-dwarf core — the source of its \"Eye of God\" look. Its proximity lets us see thousands of cometary knots, finger-like clumps of gas each larger than our solar system.","catalog":"NGC 7293"}, hans:{"type":"行星状星云","distance":"约 650 光年","constellation":"宝瓶座","facts":[["别称","上帝之眼"],["直径","约 2.5 光年"]],"desc":"螺旋星云是距地球最近的行星状星云之一，为我们预览了太阳临终时的景象。当类太阳恒星抛射外层物质，便在灼热的白矮星核心周围留下层层发光的壳层，造就了“上帝之眼”的模样。因距离近，我们能看到成千上万个“彗星状结节”——每个手指状的气体团块都比整个太阳系还大。","catalog":"NGC 7293"}, hant:{"type":"行星状星雲","distance":"約 650 光年","constellation":"寶瓶座","facts":[["別稱","上帝之眼"],["直徑","約 2.5 光年"]],"desc":"螺旋星雲是距地球最近的行星狀星雲之一，為我們預覽了太陽臨終時的景象。當類太陽恆星拋射外層物質，便在灼熱的白矮星核心周圍留下層層發光的殼層，造就了「上帝之眼」的模樣。因距離近，我們能看到成千上萬個「彗星狀結節」——每個手指狀的氣體團塊都比整個太陽系還大。","catalog":"NGC 7293"}, ja:{"type":"惑星状星雲","distance":"約650光年","constellation":"みずがめ座","facts":[["別名","神の目（Eye of God）"],["直径","約2.5光年"]],"desc":"らせん星雲は地球に最も近い惑星状星雲の一つで、太陽のような星の最期を間近で見せてくれます。太陽型の星が外層を放出すると、高温の白色矮星を中心に何層もの輝くガスの殻が残り、「神の目」と呼ばれる姿を作ります。近いため、太陽系よりも大きな指状のガスの塊「彗星状ノット」が何千も見えます。","catalog":"NGC 7293"}, ko:{"type":"행성상성운","distance":"약 650광년","constellation":"물병자리","facts":[["별칭","신의 눈(Eye of God)"],["지름","약 2.5광년"]],"desc":"나선 성운은 지구에서 가장 가까운 행성상성운 중 하나로, 태양과 같은 별의 죽음을 가까이서 보여줍니다. 태양형 별이 바깥층을 내뿜으면 뜨거운 백색왜성 핵을 중심으로 여러 겹의 빛나는 껍질이 남아 ‘신의 눈’이라 불리는 모습을 만듭니다. 가까운 덕분에 태양계보다 큰 손가락 모양의 가스 덩어리인 ‘혜성상 매듭’ 수천 개를 볼 수 있습니다.","catalog":"NGC 7293"} } },
      { p: galPos(206.9, -16.8, 1.5),
        t: {"en":["Horsehead Nebula (Barnard 33)"],"hans":["马头星云（巴纳德33）"],"hant":["馬頭星雲（巴納德33）"],"ja":["馬頭星雲（バーナード33）"],"ko":["말머리성운 (바너드 33)"]},
        info: { en:{"type":"Dark nebula (absorption)","distance":"~1,500 light-years","constellation":"Orion","facts":[["Silhouette width","~3.5 light-years"],["Glowing backdrop","IC 434 (emission nebula)"]],"desc":"The Horsehead is a dark, or absorption, nebula: a cold, dense cloud of dust so thick it blots out the light behind it, appearing as a black silhouette against the red glow of emission nebula IC 434. Unlike an emission nebula (gas made to glow) or a reflection nebula (dust scattering starlight blue), a dark nebula reveals itself only by the light it hides. Inside these frigid clouds, the gas and dust are the raw material from which new stars will one day form.","catalog":"Barnard 33"}, hans:{"type":"暗星云（吸收星云）","distance":"约 1,500 光年","constellation":"猎户座","facts":[["剪影宽度","约 3.5 光年"],["背后辉光","IC 434（发射星云）"]],"desc":"马头星云是一片暗星云（吸收星云）：由寒冷致密的尘埃组成，浓厚到足以遮住背后的光，在发射星云 IC 434 的红色辉光衬托下显出漆黑的剪影。与自身发光的发射星云、以及散射星光呈蓝色的反射星云不同，暗星云只能靠它所遮挡的光来显现。这些冰冷云团中的气体与尘埃，正是未来孕育新恒星的原材料。","catalog":"Barnard 33"}, hant:{"type":"暗星雲（吸收星雲）","distance":"約 1,500 光年","constellation":"獵戶座","facts":[["剪影寬度","約 3.5 光年"],["背後輝光","IC 434（發射星雲）"]],"desc":"馬頭星雲是一片暗星雲（吸收星雲）：由寒冷緻密的塵埃組成，濃厚到足以遮住背後的光，在發射星雲 IC 434 的紅色輝光襯托下顯出漆黑的剪影。與自身發光的發射星雲、以及散射星光呈藍色的反射星雲不同，暗星雲只能靠它所遮擋的光來顯現。這些冰冷雲團中的氣體與塵埃，正是未來孕育新恆星的原料。","catalog":"Barnard 33"}, ja:{"type":"暗黒星雲（吸収星雲）","distance":"約1,500光年","constellation":"オリオン座","facts":[["シルエットの幅","約3.5光年"],["背景の輝き","IC 434（輝線星雲）"]],"desc":"馬頭星雲は暗黒星雲（吸収星雲）で、冷たく濃密な塵の雲が背後の光を遮るほど厚く、輝線星雲 IC 434 の赤い輝きを背景に黒いシルエットとして浮かび上がります。自ら輝く輝線星雲や、星の光を青く散乱させる反射星雲とは異なり、暗黒星雲は自らが隠す光によってのみ姿を現します。この冷たい雲の中のガスと塵は、やがて新しい星を生み出す材料なのです。","catalog":"Barnard 33"}, ko:{"type":"암흑성운 (흡수성운)","distance":"약 1,500광년","constellation":"오리온자리","facts":[["실루엣 폭","약 3.5광년"],["뒤편 발광원","IC 434 (발광성운)"]],"desc":"말머리성운은 암흑성운(흡수성운)으로, 차갑고 밀도 높은 먼지 구름이 뒤쪽 빛을 가릴 만큼 짙어 발광성운 IC 434의 붉은 빛을 배경으로 검은 실루엣처럼 떠오릅니다. 스스로 빛나는 발광성운이나 별빛을 파랗게 산란시키는 반사성운과 달리, 암흑성운은 자신이 가리는 빛으로만 모습을 드러냅니다. 이 차가운 구름 속 가스와 먼지는 언젠가 새로운 별을 탄생시킬 재료입니다.","catalog":"Barnard 33"} } },
      { p: galPos(65, -27.3, 33),
        t: {"en":["Messier 15"],"hans":["梅西耶15"],"hant":["梅西爾15"],"ja":["メシエ15"],"ko":["메시에 15"]},
        info: { en:{"type":"Globular cluster (core-collapsed)","distance":"~33,600 light-years","constellation":"Pegasus","facts":[["Stars","hundreds of thousands"],["Age","~12 billion years"]],"desc":"Messier 15 is one of the densest globular clusters known: its core has collapsed inward, packing hundreds of thousands of ancient stars into a tight ball. Those stars are roughly 12 billion years old, survivors from the early universe. Like all globulars, M15 belongs to the Milky Way's halo, orbiting far above the flat disc of the galaxy.","catalog":"M15"}, hans:{"type":"球状星团（核心塌缩）","distance":"约 33,600 光年","constellation":"飞马座","facts":[["恒星数量","数十万颗"],["年龄","约 120 亿年"]],"desc":"梅西耶15是已知密度最高的球状星团之一——它的核心已经塌缩，将数十万颗古老恒星紧紧聚集成一个致密的球体。这些恒星年龄约 120 亿年，是宇宙早期遗留至今的幸存者。像所有球状星团一样，M15 属于银河系的银晕，运行在银盘平面之上很高的地方。","catalog":"M15"}, hant:{"type":"球狀星團（核心塌縮）","distance":"約 33,600 光年","constellation":"飛馬座","facts":[["恆星數量","數十萬顆"],["年齡","約 120 億年"]],"desc":"梅西爾15是已知密度最高的球狀星團之一——它的核心已經塌縮，將數十萬顆古老恆星緊緊聚集成一個緻密的球體。這些恆星年齡約 120 億年，是宇宙早期遺留至今的倖存者。如同所有球狀星團，M15 屬於銀河系的銀暈，運行在銀盤平面之上很高的地方。","catalog":"M15"}, ja:{"type":"球状星団（コア崩壊型）","distance":"約 33,600 光年","constellation":"ペガスス座","facts":[["星の数","数十万個"],["年齢","約 120 億年"]],"desc":"メシエ15は、知られている中で最も高密度な球状星団の一つで、中心部が収縮（コア崩壊）し、数十万個もの古い星が密集しています。これらの星は約 120 億年前に生まれ、宇宙初期からの生き残りです。すべての球状星団と同じく、M15 は銀河系のハローに属し、円盤面のはるか上空を公転しています。","catalog":"M15"}, ko:{"type":"구상성단(코어 붕괴형)","distance":"약 33,600광년","constellation":"페가수스자리","facts":[["별의 수","수십만 개"],["나이","약 120억 년"]],"desc":"메시에 15는 알려진 것 중 가장 밀도가 높은 구상성단의 하나로, 중심핵이 붕괴(코어 붕괴)하여 수십만 개의 오래된 별이 촘촘히 뭉쳐 있습니다. 이 별들은 약 120억 년 전에 태어난, 초기 우주의 생존자입니다. 모든 구상성단처럼 M15도 은하 헤일로에 속하며, 은하 원반면 훨씬 위쪽을 공전합니다.","catalog":"M15"} } },
      { p: galPos(3.9, 46.8, 24.5),
        t: {"en":["Messier 5"],"hans":["梅西耶5"],"hant":["梅西耶5"],"ja":["メシエ5"],"ko":["메시에 5"]},
        info: { en:{"type":"Globular cluster","distance":"~24,500 light-years","constellation":"Serpens","facts":[["Age","~13 billion years"],["Stars","hundreds of thousands"]],"desc":"Messier 5 is one of the oldest and largest globular clusters in our galaxy, having formed roughly 13 billion years ago in the early universe. Hundreds of thousands of ancient stars are packed into a near-perfect sphere by their mutual gravity. Clusters like this orbit far out in the Milky Way's halo, preserving some of the oldest stars we can see.","catalog":"M5"}, hans:{"type":"球状星团","distance":"约 24,500 光年","constellation":"巨蛇座","facts":[["年龄","约 130 亿年"],["恒星数量","数十万颗"]],"desc":"梅西耶5是银河系中最古老、最庞大的球状星团之一，约在130亿年前的早期宇宙中形成。数十万颗古老恒星在彼此的引力作用下聚成一个近乎完美的球体。这类星团在银河系的银晕中远远地环绕运行，保存着我们所能观测到的一些最古老的恒星。","catalog":"M5"}, hant:{"type":"球狀星團","distance":"約 24,500 光年","constellation":"巨蛇座","facts":[["年齡","約 130 億年"],["恆星數量","數十萬顆"]],"desc":"梅西耶5是銀河系中最古老、最龐大的球狀星團之一，約在130億年前的早期宇宙中形成。數十萬顆古老恆星在彼此的引力作用下聚成一個近乎完美的球體。這類星團在銀河系的銀暈中遠遠地環繞運行，保存著我們所能觀測到的一些最古老的恆星。","catalog":"M5"}, ja:{"type":"球状星団","distance":"約24,500光年","constellation":"へび座","facts":[["年齢","約130億年"],["恒星の数","数十万個"]],"desc":"メシエ5は、私たちの銀河系で最も古く、最も大きな球状星団の一つで、約130億年前の初期宇宙で誕生しました。数十万個もの古い星々が、互いの重力によってほぼ完全な球状に密集しています。こうした星団は銀河系のハローの遠方を周回し、観測できる最古の星々を今に伝えています。","catalog":"M5"}, ko:{"type":"구상성단","distance":"약 24,500광년","constellation":"뱀자리","facts":[["나이","약 130억 년"],["별의 수","수십만 개"]],"desc":"메시에 5는 우리 은하에서 가장 오래되고 가장 큰 구상성단 중 하나로, 약 130억 년 전 초기 우주에서 형성되었습니다. 수십만 개의 늙은 별들이 서로의 중력으로 거의 완벽한 구형을 이루며 빽빽하게 모여 있습니다. 이런 성단은 은하 헤일로의 먼 바깥을 공전하며, 우리가 볼 수 있는 가장 오래된 별들을 간직하고 있습니다.","catalog":"M5"} } },
      { p: galPos(9.9, -7.6, 10.4),
        t: {"en":["Messier 22"],"hans":["梅西耶22"],"hant":["梅西爾22"],"ja":["メシエ22"],"ko":["메시에 22"]},
        info: { en:{"type":"Globular cluster","distance":"~10,400 light-years","constellation":"Sagittarius","facts":[["Apparent magnitude","~5.1 (naked-eye)"],["Apparent size","~32' (about the full Moon)"]],"desc":"Messier 22 is one of the nearest and brightest globular clusters, lying only about 10,400 light-years away toward the crowded galactic bulge in Sagittarius. Under dark skies it is bright enough to glimpse with the naked eye as a faint fuzzy patch, and binoculars begin to resolve its swarm of tens of thousands of stars. Its low position near the Milky Way's center makes it a standout target when Sagittarius climbs the summer sky.","catalog":"M22"}, hans:{"type":"球状星团","distance":"约 10,400 光年","constellation":"人马座","facts":[["视星等","约 5.1（肉眼可见）"],["视直径","约 32′（约等于满月）"]],"desc":"梅西耶22是距离最近、也最明亮的球状星团之一，位于人马座方向、朝向拥挤的银河系核球，距地球仅约10,400光年。在黑暗的夜空下，它亮到肉眼即可看见，呈一小团朦胧的光斑，用双筒望远镜便能开始分辨出其中成千上万颗恒星。夏季人马座升起时，它靠近银河中心的位置使其成为引人注目的观测目标。","catalog":"M22"}, hant:{"type":"球狀星團","distance":"約 10,400 光年","constellation":"人馬座","facts":[["視星等","約 5.1（肉眼可見）"],["視直徑","約 32′（約等於滿月）"]],"desc":"梅西爾22是距離最近、也最明亮的球狀星團之一，位於人馬座方向、朝向擁擠的銀河系核球，距地球僅約10,400光年。在黑暗的夜空下，它亮到肉眼即可看見，呈一小團朦朧的光斑，用雙筒望遠鏡便能開始分辨出其中成千上萬顆恆星。夏季人馬座升起時，它靠近銀河中心的位置使其成為引人注目的觀測目標。","catalog":"M22"}, ja:{"type":"球状星団","distance":"約10,400光年","constellation":"いて座","facts":[["視等級","約5.1（肉眼で見える）"],["視直径","約32′（ほぼ満月大）"]],"desc":"メシエ22は、最も近く明るい球状星団の一つで、いて座の方向、混み合った銀河系のバルジへ向かって約10,400光年の距離にあります。暗い空の下では肉眼でもぼんやりとした光の塊として見えるほど明るく、双眼鏡を使えば数万個もの星が一つ一つ分かれて見え始めます。夏にいて座が昇るころ、銀河中心近くに位置するこの星団は見応えのある観測対象となります。","catalog":"M22"}, ko:{"type":"구상성단","distance":"약 10,400광년","constellation":"궁수자리","facts":[["겉보기 등급","약 5.1 (맨눈 관측 가능)"],["겉보기 크기","약 32′ (보름달과 비슷)"]],"desc":"메시에 22는 가장 가깝고 밝은 구상성단 가운데 하나로, 궁수자리 방향으로 붐비는 은하 팽대부를 향해 약 10,400광년 거리에 있습니다. 어두운 하늘에서는 맨눈으로도 흐릿한 빛 무리로 보일 만큼 밝으며, 쌍안경으로 보면 수만 개의 별이 하나하나 분해되어 보이기 시작합니다. 여름철 궁수자리가 떠오를 때 은하 중심 근처에 자리한 이 성단은 인상적인 관측 대상이 됩니다.","catalog":"M22"} } },
      { p: galPos(123.3, 26.5, 0.433),
        t: {"en":["Polaris"],"hans":["北极星"],"hant":["北極星"],"ja":["北極星"],"ko":["북극성"]},
        info: { en:{"type":"Cepheid variable star","distance":"~433 light-years","constellation":"Ursa Minor","facts":[["Pulsation period","~3.97 days"],["Offset from celestial pole","~0.7°"]],"desc":"Polaris is a Cepheid variable — a pulsating star that brightens and dims on a strict clock. Because a Cepheid's pulsation period is tied to its true luminosity, comparing that intrinsic brightness with how bright it appears reveals its distance, making Cepheids a key rung of the cosmic distance ladder. Polaris also sits within about 0.7° of the north celestial pole, so it barely moves through the night and has guided navigators north for centuries.","catalog":"α UMi"}, hans:{"type":"造父变星","distance":"约 433 光年","constellation":"小熊座","facts":[["脉动周期","约 3.97 天"],["距天北极","约 0.7°"]],"desc":"北极星是一颗造父变星——一种按精确节律明暗交替的脉动恒星。造父变星的脉动周期与其真实光度直接相关，把这一内禀亮度与它看起来的亮度比较，便可推算距离，因此造父变星是宇宙距离阶梯的关键一级。北极星距天北极仅约 0.7°，整夜几乎不动，数百年来一直为航海者指示正北方向。","catalog":"α UMi"}, hant:{"type":"造父變星","distance":"約 433 光年","constellation":"小熊座","facts":[["脈動週期","約 3.97 天"],["距天北極","約 0.7°"]],"desc":"北極星是一顆造父變星——一種按精確節律明暗交替的脈動恆星。造父變星的脈動週期與其真實光度直接相關，把這一內稟亮度與它看起來的亮度比較，便可推算距離，因此造父變星是宇宙距離階梯的關鍵一級。北極星距天北極僅約 0.7°，整夜幾乎不動，數百年來一直為航海者指示正北方向。","catalog":"α UMi"}, ja:{"type":"ケフェイド変光星","distance":"約433光年","constellation":"こぐま座","facts":[["脈動周期","約3.97日"],["天の北極からの距離","約0.7°"]],"desc":"北極星はケフェイド変光星——正確な周期で明るさが変わる脈動星です。ケフェイド変光星は脈動周期が真の光度と結びついているため、その本来の明るさと見かけの明るさを比べれば距離がわかり、宇宙の距離はしごの重要な一段となります。北極星は天の北極から約0.7°しか離れておらず、一晩中ほとんど動かないため、何世紀にもわたって航海者に北を示してきました。","catalog":"α UMi"}, ko:{"type":"세페이드 변광성","distance":"약 433광년","constellation":"작은곰자리","facts":[["맥동 주기","약 3.97일"],["천구 북극과의 거리","약 0.7°"]],"desc":"북극성은 세페이드 변광성으로, 정확한 주기로 밝아졌다 어두워지는 맥동성입니다. 세페이드 변광성은 맥동 주기가 실제 광도와 연결되어 있어, 이 고유 밝기와 겉보기 밝기를 비교하면 거리를 알 수 있으므로 우주 거리 사다리의 핵심 단계가 됩니다. 북극성은 천구 북극에서 약 0.7°밖에 떨어져 있지 않아 밤새 거의 움직이지 않으며, 수 세기 동안 항해자에게 북쪽을 알려 왔습니다.","catalog":"α UMi"} } },
      { p: galPos(313.9, -1.9, 0.0042),
        t: {"en":["Proxima Centauri"],"hans":["比邻星"],"hant":["比鄰星"],"ja":["プロキシマ・ケンタウリ"],"ko":["프록시마 센타우리"]},
        info: { en:{"type":"Red dwarf (flare star)","distance":"~4.24 light-years","constellation":"Centaurus","facts":[["Proxima b mass","~1.1 Earth masses"],["Spectral type","M5.5Ve (red dwarf)"]],"desc":"Proxima Centauri is the closest star to the Sun, a small, cool red dwarf that unleashes sudden flares far brighter than our steady Sun. Despite its faintness, it hosts Proxima b, a roughly Earth-mass planet orbiting in the habitable zone. This makes it both our nearest stellar neighbour and the site of the nearest known exoplanet.","catalog":"α Cen C"}, hans:{"type":"红矮星（耀星）","distance":"约 4.24 光年","constellation":"半人马座","facts":[["比邻星b质量","约 1.1 个地球质量"],["光谱型","M5.5Ve（红矮星）"]],"desc":"比邻星是距离太阳最近的恒星，一颗又小又冷的红矮星，会突然爆发出比平稳的太阳明亮得多的耀斑。尽管它十分暗弱，却拥有一颗行星比邻星b，其质量约与地球相当，且运行在宜居带内。因此，它既是离我们最近的恒星邻居，也是已知最近的系外行星所在之处。","catalog":"α Cen C"}, hant:{"type":"紅矮星（耀星）","distance":"約 4.24 光年","constellation":"半人馬座","facts":[["比鄰星b質量","約 1.1 個地球質量"],["光譜型","M5.5Ve（紅矮星）"]],"desc":"比鄰星是距離太陽最近的恆星，一顆又小又冷的紅矮星，會突然爆發出比平穩的太陽明亮得多的閃焰。儘管它十分暗弱，卻擁有一顆行星比鄰星b，其質量約與地球相當，且運行在適居帶內。因此，它既是離我們最近的恆星鄰居，也是已知最近的系外行星所在之處。","catalog":"α Cen C"}, ja:{"type":"赤色矮星（閃光星）","distance":"約4.24光年","constellation":"ケンタウルス座","facts":[["プロキシマbの質量","地球の約1.1倍"],["スペクトル型","M5.5Ve（赤色矮星）"]],"desc":"プロキシマ・ケンタウリは太陽に最も近い恒星で、小さく低温の赤色矮星でありながら、穏やかな太陽よりはるかに明るいフレアを突然放ちます。暗い星ですが、地球ほどの質量をもつ惑星プロキシマbがハビタブルゾーンを公転しています。そのため、太陽系で最も近い恒星であると同時に、最も近い既知の系外惑星が存在する場所でもあります。","catalog":"α Cen C"}, ko:{"type":"적색왜성(섬광성)","distance":"약 4.24광년","constellation":"센타우루스자리","facts":[["프록시마 b 질량","지구의 약 1.1배"],["분광형","M5.5Ve(적색왜성)"]],"desc":"프록시마 센타우리는 태양에서 가장 가까운 별로, 작고 차가운 적색왜성이지만 잔잔한 태양보다 훨씬 밝은 플레어를 갑자기 내뿜습니다. 어두운 별임에도 지구와 질량이 비슷한 행성 프록시마 b가 생명체 거주가능 영역을 공전하고 있습니다. 덕분에 가장 가까운 항성 이웃이자 가장 가까운 알려진 외계행성의 보금자리이기도 합니다.","catalog":"α Cen C"} } },
      { p: galPos(28, -0.4, 5.1),
        t: {"en":["UY Scuti"],"hans":["盾牌座UY"],"hant":["盾牌座UY"],"ja":["たて座UY星"],"ko":["방패자리 UY"]},
        info: { en:{"type":"Red hypergiant","distance":"~5,100 light-years","constellation":"Scutum","facts":[["Radius","~1,700× the Sun"],["Volume","~5 billion Suns"]],"desc":"UY Scuti is one of the largest stars known by radius, stretching roughly 1,700 times wider than the Sun. If it replaced the Sun at the center of our solar system, its glowing surface would engulf the orbits of Mercury, Venus, Earth, Mars, and even Jupiter. It marks the extreme upper end of how big a star can grow.","catalog":"UY Sct"}, hans:{"type":"红特超巨星","distance":"约 5,100 光年","constellation":"盾牌座","facts":[["半径","约为太阳的 1,700 倍"],["体积","约 50 亿个太阳"]],"desc":"盾牌座UY是已知半径最大的恒星之一，直径约为太阳的 1,700 倍。如果把它放在太阳的位置，它炙热的表面会吞没水星、金星、地球、火星，甚至木星的轨道。它代表着恒星大小所能达到的极限。","catalog":"UY Sct"}, hant:{"type":"紅特超巨星","distance":"約 5,100 光年","constellation":"盾牌座","facts":[["半徑","約為太陽的 1,700 倍"],["體積","約 50 億個太陽"]],"desc":"盾牌座UY是已知半徑最大的恆星之一，直徑約為太陽的 1,700 倍。如果把它放在太陽的位置，它熾熱的表面會吞沒水星、金星、地球、火星，甚至木星的軌道。它代表著恆星大小所能達到的極限。","catalog":"UY Sct"}, ja:{"type":"赤色極超巨星","distance":"約5,100光年","constellation":"たて座","facts":[["半径","太陽の約1,700倍"],["体積","太陽約50億個分"]],"desc":"たて座UY星は、半径で見ると知られている中で最も大きな恒星の一つで、太陽の約1,700倍もの大きさがあります。もし太陽の位置に置けば、その輝く表面は水星・金星・地球・火星、さらには木星の軌道まで飲み込んでしまいます。恒星がどこまで大きくなれるか、その極限を示す存在です。","catalog":"UY Sct"}, ko:{"type":"적색 극대거성","distance":"약 5,100광년","constellation":"방패자리","facts":[["반지름","태양의 약 1,700배"],["부피","태양 약 50억 개"]],"desc":"방패자리 UY는 반지름 기준으로 알려진 가장 큰 별 중 하나로, 지름이 태양의 약 1,700배에 이릅니다. 만약 태양 자리에 놓는다면 그 이글거리는 표면이 수성, 금성, 지구, 화성은 물론 목성의 궤도까지 삼켜 버립니다. 별이 얼마나 커질 수 있는지, 그 극한을 보여 주는 천체입니다.","catalog":"UY Sct"} } },
      { p: galPos(69.5, -47.2, 0.0409),
        t: {"en":["TRAPPIST-1"],"hans":["TRAPPIST-1"],"hant":["TRAPPIST-1"],"ja":["トラピスト1"],"ko":["트라피스트-1"]},
        info: { en:{"type":"Ultracool red dwarf star","distance":"~40 light-years","constellation":"Aquarius","facts":[["Planets","7 (all Earth-size)"],["In habitable zone","3-4"]],"desc":"This dim, ultracool red dwarf is circled by seven roughly Earth-size planets — more than are known around any other single star. Three or four of them orbit within the habitable zone, where liquid water could exist. That makes TRAPPIST-1 the richest known laboratory for studying potentially habitable worlds.","catalog":"TRAPPIST-1"}, hans:{"type":"超冷红矮星","distance":"约 40 光年","constellation":"宝瓶座","facts":[["行星数量","7 颗（均为地球大小）"],["宜居带内","3–4 颗"]],"desc":"这颗昏暗的超冷红矮星拥有七颗与地球大小相近的行星，是目前已知单颗恒星周围行星数量最多的系统。其中三到四颗位于可能存在液态水的宜居带内。这使 TRAPPIST-1 成为研究潜在宜居世界最丰富的天然实验室。","catalog":"TRAPPIST-1"}, hant:{"type":"超冷紅矮星","distance":"約 40 光年","constellation":"寶瓶座","facts":[["行星數量","7 顆（均為地球大小）"],["宜居帶內","3–4 顆"]],"desc":"這顆昏暗的超冷紅矮星擁有七顆與地球大小相近的行星，是目前已知單一恆星周圍行星數量最多的系統。其中三到四顆位於可能存在液態水的宜居帶內。這使 TRAPPIST-1 成為研究潛在宜居世界最豐富的天然實驗室。","catalog":"TRAPPIST-1"}, ja:{"type":"超低温の赤色矮星","distance":"約40光年","constellation":"みずがめ座","facts":[["惑星の数","7個（すべて地球サイズ）"],["ハビタブルゾーン内","3〜4個"]],"desc":"この暗く低温の赤色矮星の周りには、地球とほぼ同じ大きさの惑星が7個も回っており、単一の恒星の周囲としては知られる中で最多です。そのうち3〜4個は液体の水が存在しうるハビタブルゾーンに位置しています。トラピスト1は、生命を宿しうる世界を研究するうえで最も恵まれた天然の実験場です。","catalog":"TRAPPIST-1"}, ko:{"type":"극저온 적색왜성","distance":"약 40광년","constellation":"물병자리","facts":[["행성 수","7개 (모두 지구 크기)"],["생명체 거주가능 영역 내","3~4개"]],"desc":"이 어둡고 극저온인 적색왜성 주위에는 지구와 비슷한 크기의 행성이 7개나 돌고 있으며, 이는 하나의 항성 주위로는 알려진 것 중 가장 많은 수입니다. 그중 3~4개는 액체 물이 존재할 수 있는 생명체 거주가능 영역에 놓여 있습니다. 이 덕분에 트라피스트-1은 잠재적 거주 가능 행성을 연구하기에 가장 풍부한 자연 실험실입니다.","catalog":"TRAPPIST-1"} } },
      { p: galPos(121, -21.6, 202), cls: 'ext', fixed: true, gal: { mode: 'spiral', opts: { sq: 0.42, arms: 2 }, size: 330, fade: 0.7, stars: { count: 26000, radius: 132, arms: 2, tight: 0.9, inc: 1.3, roll: 0.6 } },
        t: {"en":["Andromeda Galaxy","beyond the Milky Way"],"hans":["仙女座星系","银河系之外"],"hant":["仙女座星系","銀河系之外"],"ja":["アンドロメダ銀河","天の川銀河の外"],"ko":["안드로메다 은하","우리은하 너머"]},
        info: { en:{"type":"Spiral galaxy · external · not to scale","distance":"~2.5 million light-years","constellation":"Andromeda","facts":[["Diameter","~152,000 ly"],["Group","Local Group"]],"desc":"The nearest large galaxy to the Milky Way and the most distant object visible to the naked eye. In about 4.5 billion years it will collide and merge with our galaxy. Shown on the far sky — far beyond the Milky Way and not to scale.","catalog":"M31"}, hans:{"type":"旋涡星系 · 银河系外 · 非真实比例","distance":"约 250 万光年","constellation":"仙女座","facts":[["直径","约 15.2 万光年"],["所属","本星系群"]],"desc":"距离银河系最近的大型星系，也是肉眼可见的最远天体。约 45 亿年后它将与银河系相撞并合。这里画在远方天幕上——远在银河系之外，非真实比例。","catalog":"M31"}, hant:{"type":"螺旋星系 · 銀河系外 · 非真實比例","distance":"約 250 萬光年","constellation":"仙女座","facts":[["直徑","約 15.2 萬光年"],["所屬","本星系群"]],"desc":"距離銀河系最近的大型星系，也是肉眼可見的最遠天體。約 45 億年後它將與銀河系相撞合併。這裡畫在遠方天幕上——遠在銀河系之外，非真實比例。","catalog":"M31"}, ja:{"type":"渦巻銀河 · 天の川銀河の外 · 実スケールではない","distance":"約250万光年","constellation":"アンドロメダ座","facts":[["直径","約15.2万光年"],["所属","局部銀河群"]],"desc":"天の川銀河に最も近い大型銀河で、肉眼で見える最も遠い天体です。約45億年後には天の川銀河と衝突・合体します。ここでは遠くの天空に描いており、天の川銀河のはるか外側で実際のスケールではありません。","catalog":"M31"}, ko:{"type":"나선 은하 · 우리은하 밖 · 실제 비율 아님","distance":"약 250만 광년","constellation":"안드로메다자리","facts":[["지름","약 15.2만 광년"],["소속","국부 은하군"]],"desc":"우리은하에서 가장 가까운 대형 은하이며 맨눈으로 볼 수 있는 가장 먼 천체입니다. 약 45억 년 뒤 우리은하와 충돌·병합합니다. 여기서는 먼 하늘에 그려져 있으며 우리은하 훨씬 바깥이고 실제 비율은 아닙니다.","catalog":"M31"} } },
      { p: galPos(133.61, -31.33, 175), cls: 'ext', fixed: true, gal: { mode: 'spiral', opts: { sq: 0.82, arms: 2, tight: 4.2, seed: 12.1 }, size: 250, fade: 0.72, stars: { count: 24000, radius: 108, arms: 2, tight: 0.72, inc: 0.78, roll: 2.2 } },
        t: {"en":["Triangulum Galaxy","in the Local Group"],"hans":["三角座星系","本星系群成员"],"hant":["三角座星系","本星系群成員"],"ja":["さんかく座銀河","局部銀河群の一員"],"ko":["삼각형자리 은하","국부 은하군의 일원"]},
        info: { en:{"type":"Spiral galaxy · external · not to scale","distance":"~2.7 million light-years","constellation":"Triangulum","facts":[["Diameter","~60,000 ly"],["Group","Local Group"]],"desc":"The third-largest galaxy in the Local Group and a graceful face-on spiral. Under very dark skies it is one of the most distant objects the unaided eye can see. With the Milky Way and Andromeda it completes the Local Group’s trio of great spirals. Drawn on the far sky, not to scale.","catalog":"M33"}, hans:{"type":"旋涡星系 · 银河系外 · 非真实比例","distance":"约 270 万光年","constellation":"三角座","facts":[["直径","约 6 万光年"],["所属","本星系群"]],"desc":"本星系群中第三大的星系，是一个正面朝向我们的秀丽旋涡星系。在非常黑暗的天空下，它是肉眼可见的最远天体之一。它与银河系、仙女座星系一起，构成本星系群三大旋涡星系。这里画在远方天幕上，非真实比例。","catalog":"M33"}, hant:{"type":"螺旋星系 · 銀河系外 · 非真實比例","distance":"約 270 萬光年","constellation":"三角座","facts":[["直徑","約 6 萬光年"],["所屬","本星系群"]],"desc":"本星系群中第三大的星系，是一個正面朝向我們的秀麗螺旋星系。在非常黑暗的天空下，它是肉眼可見的最遠天體之一。它與銀河系、仙女座星系一起，構成本星系群三大螺旋星系。這裡畫在遠方天幕上，非真實比例。","catalog":"M33"}, ja:{"type":"渦巻銀河 · 天の川銀河の外 · 実スケールではない","distance":"約270万光年","constellation":"さんかく座","facts":[["直径","約6万光年"],["所属","局部銀河群"]],"desc":"局部銀河群で3番目に大きい銀河で、正面を向いた優美な渦巻銀河です。非常に暗い空の下では、肉眼で見える最も遠い天体のひとつです。天の川銀河とアンドロメダ銀河とともに、局部銀河群の三大渦巻銀河をなしています。ここでは遠くの天空に描いており、実際のスケールではありません。","catalog":"M33"}, ko:{"type":"나선 은하 · 우리은하 밖 · 실제 비율 아님","distance":"약 270만 광년","constellation":"삼각형자리","facts":[["지름","약 6만 광년"],["소속","국부 은하군"]],"desc":"국부 은하군에서 세 번째로 큰 은하이며, 정면을 향한 우아한 나선 은하입니다. 매우 어두운 하늘에서는 맨눈으로 볼 수 있는 가장 먼 천체 중 하나입니다. 우리은하, 안드로메다은하와 함께 국부 은하군의 3대 나선 은하를 이룹니다. 여기서는 먼 하늘에 그려져 있으며 실제 비율은 아닙니다.","catalog":"M33"} } },
      { p: galPos(298.46, 51.15, 195), cls: 'ext', fixed: true, gal: { mode: 'sombrero', opts: { sq: 0.19, seed: 9.4 }, size: 235, fade: 0.75, stars: { kind: 'spiral', count: 22000, radius: 106, arms: 2, tight: 1.15, inc: 1.45, roll: 1.0, haloSize: 0.78, haloOpacity: 0.2, coreSize: 0.3, coreOpacity: 0.85 } },
        t: {"en":["Sombrero Galaxy","seen edge-on"],"hans":["草帽星系","侧向观测"],"hant":["草帽星系","側向觀測"],"ja":["ソンブレロ銀河","真横から見た姿"],"ko":["솜브레로 은하","옆에서 본 모습"]},
        info: { en:{"type":"Spiral galaxy · edge-on · not to scale","distance":"~29 million light-years","constellation":"Virgo","facts":[["Distance","~29 million ly"],["Feature","edge-on dust lane"]],"desc":"We view this bright spiral almost exactly edge-on: a glowing white bulge split by a dark lane of dust, the silhouette that earns it the name Sombrero. A black hole of about a billion suns sits at its core. Drawn on the far sky, not to scale.","catalog":"M104"}, hans:{"type":"旋涡星系 · 侧向 · 非真实比例","distance":"约 2900 万光年","constellation":"室女座","facts":[["距离","约 2900 万光年"],["特征","侧向尘埃带"]],"desc":"我们几乎正好从侧面看这个明亮的旋涡星系：发光的白色核球被一条暗色尘埃带分割，正是这道剪影使它得名草帽。核心坐落着一个约十亿倍太阳质量的黑洞。这里画在远方天幕上，非真实比例。","catalog":"M104"}, hant:{"type":"螺旋星系 · 側向 · 非真實比例","distance":"約 2900 萬光年","constellation":"室女座","facts":[["距離","約 2900 萬光年"],["特徵","側向塵埃帶"]],"desc":"我們幾乎正好從側面看這個明亮的螺旋星系：發光的白色核球被一條暗色塵埃帶分割，正是這道剪影使它得名草帽。核心坐落著一個約十億倍太陽質量的黑洞。這裡畫在遠方天幕上，非真實比例。","catalog":"M104"}, ja:{"type":"渦巻銀河 · 真横 · 実スケールではない","distance":"約2900万光年","constellation":"おとめ座","facts":[["距離","約2900万光年"],["特徴","真横に走る暗黒帯"]],"desc":"この明るい渦巻銀河をほぼ真横から見ています：輝く白いバルジが暗い塵の帯で分けられ、このシルエットがソンブレロの名の由来です。中心には太陽の約10億倍の質量をもつブラックホールがあります。ここでは遠くの天空に描いており、実際のスケールではありません。","catalog":"M104"}, ko:{"type":"나선 은하 · 옆면 · 실제 비율 아님","distance":"약 2900만 광년","constellation":"처녀자리","facts":[["거리","약 2900만 광년"],["특징","옆면 먼지 띠"]],"desc":"이 밝은 나선 은하를 거의 정확히 옆에서 봅니다: 빛나는 흰색 팽대부가 어두운 먼지 띠로 갈라져 있으며, 바로 이 실루엣이 솜브레로라는 이름을 얻게 했습니다. 중심에는 태양 약 10억 배 질량의 블랙홀이 있습니다. 여기서는 먼 하늘에 그려져 있으며 실제 비율은 아닙니다.","catalog":"M104"} } },

        info: { en:{"type":"Giant elliptical · external · not to scale","distance":"~53 million light-years","constellation":"Virgo","facts":[["Black hole","~6.5 billion suns"],["Cluster","Virgo Cluster"]],"desc":"A giant elliptical ruling the heart of the Virgo Cluster, built from trillions of old stars. Its central black hole — some 6.5 billion times the Sun’s mass — was the first ever photographed, by the Event Horizon Telescope in 2019, the same array that later imaged our own Sagittarius A*. Drawn on the far sky, not to scale.","catalog":"M87"}, hans:{"type":"巨椭圆星系 · 银河系外 · 非真实比例","distance":"约 5300 万光年","constellation":"室女座","facts":[["黑洞","约 65 亿倍太阳质量"],["星系团","室女座星系团"]],"desc":"统治室女座星系团核心的巨椭圆星系，由数万亿颗年老恒星构成。其中心黑洞——质量约为太阳的 65 亿倍——是有史以来第一个被拍摄到的黑洞，由事件视界望远镜于 2019 年拍摄，该阵列后来还拍摄了我们自己的人马座 A*。这里画在远方天幕上，非真实比例。","catalog":"M87"}, hant:{"type":"巨橢圓星系 · 銀河系外 · 非真實比例","distance":"約 5300 萬光年","constellation":"室女座","facts":[["黑洞","約 65 億倍太陽質量"],["星系團","室女座星系團"]],"desc":"統治室女座星系團核心的巨橢圓星系，由數兆顆年老恆星構成。其中心黑洞——質量約為太陽的 65 億倍——是有史以來第一個被拍攝到的黑洞，由事件視界望遠鏡於 2019 年拍攝，該陣列後來還拍攝了我們自己的人馬座 A*。這裡畫在遠方天幕上，非真實比例。","catalog":"M87"}, ja:{"type":"巨大楕円銀河 · 天の川銀河の外 · 実スケールではない","distance":"約5300万光年","constellation":"おとめ座","facts":[["ブラックホール","太陽質量の約65億倍"],["銀河団","おとめ座銀河団"]],"desc":"おとめ座銀河団の中心に君臨する巨大楕円銀河で、数兆個もの年老いた星からなります。中心にある太陽質量の約65億倍のブラックホールは、2019年にイベント・ホライズン・テレスコープが史上初めて撮影したもので、この望遠鏡群は後に私たちのいて座A*も撮影しました。ここでは遠くの天空に描いており、実際のスケールではありません。","catalog":"M87"}, ko:{"type":"거대 타원 은하 · 우리은하 밖 · 실제 비율 아님","distance":"약 5300만 광년","constellation":"처녀자리","facts":[["블랙홀","태양 질량의 약 65억 배"],["은하단","처녀자리 은하단"]],"desc":"처녀자리 은하단의 중심에 군림하는 거대 타원 은하로, 수조 개의 늙은 별로 이루어져 있습니다. 중심의 블랙홀은 태양 질량의 약 65억 배로, 2019년 사건 지평선 망원경이 사상 처음으로 촬영한 블랙홀이며, 이 망원경 배열은 나중에 우리은하의 궁수자리 A*도 촬영했습니다. 먼 하늘에 그려져 있으며 실제 비율은 아닙니다.","catalog":"M87"} } },

        info: { en:{"type":"Active galaxy · external · not to scale","distance":"~13 million light-years","constellation":"Centaurus","facts":[["Distance","~13 million ly"],["Feature","radio jets"]],"desc":"The nearest active galaxy to us: a giant elliptical crossed by a warped dark dust lane, the wreckage of a spiral it swallowed. Its central black hole launches jets that blaze across the radio sky, making it one of the brightest radio sources in the heavens. Drawn on the far sky, not to scale.","catalog":"NGC 5128"}, hans:{"type":"活动星系 · 银河系外 · 非真实比例","distance":"约 1300 万光年","constellation":"半人马座","facts":[["距离","约 1300 万光年"],["特征","射电喷流"]],"desc":"距离我们最近的活动星系：一个巨大的椭圆星系，被一条扭曲的暗尘埃带横贯，那是它吞并的旋涡星系的残骸。中心黑洞喷射出的喷流横扫射电天空，使它成为全天最明亮的射电源之一。这里画在远方天幕上，非真实比例。","catalog":"NGC 5128"}, hant:{"type":"活躍星系 · 銀河系外 · 非真實比例","distance":"約 1300 萬光年","constellation":"半人馬座","facts":[["距離","約 1300 萬光年"],["特徵","電波噴流"]],"desc":"距離我們最近的活躍星系：一個巨大的橢圓星系，被一條扭曲的暗塵埃帶橫貫，那是它吞併的螺旋星系的殘骸。中心黑洞噴射出的噴流橫掃電波天空，使它成為全天最明亮的電波源之一。這裡畫在遠方天幕上，非真實比例。","catalog":"NGC 5128"}, ja:{"type":"活動銀河 · 天の川銀河の外 · 実スケールではない","distance":"約1300万光年","constellation":"ケンタウルス座","facts":[["距離","約1300万光年"],["特徴","電波ジェット"]],"desc":"私たちに最も近い活動銀河で、飲み込んだ渦巻銀河の名残であるねじれた暗い塵の帯が横切る巨大な楕円銀河です。中心のブラックホールが噴き出すジェットは電波の空を貫き、全天で最も明るい電波源の一つです。ここでは遠くの天空に描いており、実際のスケールではありません。","catalog":"NGC 5128"}, ko:{"type":"활동 은하 · 우리은하 밖 · 실제 비율 아님","distance":"약 1300만 광년","constellation":"센타우루스자리","facts":[["거리","약 1300만 광년"],["특징","전파 제트"]],"desc":"우리에게 가장 가까운 활동 은하로, 집어삼킨 나선 은하의 잔해인 뒤틀린 어두운 먼지 띠가 가로지르는 거대 타원 은하입니다. 중심 블랙홀이 내뿜는 제트는 전파 하늘을 가로질러 하늘에서 가장 밝은 전파원 중 하나입니다. 여기서는 먼 하늘에 그려져 있으며 실제 비율은 아닙니다.","catalog":"NGC 5128"} } },

        info: { en:{"type":"Satellite galaxy · irregular · not to scale","distance":"~160,000 light-years","constellation":"Dorado","facts":[["Distance","~160,000 ly"],["Hosts","Tarantula, SN 1987A"]],"desc":"The largest satellite galaxy of the Milky Way, a barred irregular orbiting close by. It cradles the Tarantula Nebula — the most furious star-forming region in the Local Group — and hosted SN 1987A, the nearest supernova seen in the modern era. A naked-eye sight from southern skies. Drawn on the far sky, not to scale.","catalog":"LMC"}, hans:{"type":"卫星星系 · 不规则 · 非真实比例","distance":"约 16 万光年","constellation":"剑鱼座","facts":[["距离","约 16 万光年"],["拥有","蜘蛛星云、SN 1987A"]],"desc":"银河系最大的卫星星系，是一个在近旁绕行的棒状不规则星系。它孕育着蜘蛛星云——本星系群中恒星形成最剧烈的区域——并曾出现 SN 1987A，即现代观测到的最近的超新星。在南半球天空可用肉眼看到。这里画在远方天幕上，非真实比例。","catalog":"LMC"}, hant:{"type":"衛星星系 · 不規則 · 非真實比例","distance":"約 16 萬光年","constellation":"劍魚座","facts":[["距離","約 16 萬光年"],["擁有","蜘蛛星雲、SN 1987A"]],"desc":"銀河系最大的衛星星系，是一個在近旁繞行的棒狀不規則星系。它孕育著蜘蛛星雲——本星系群中恆星形成最劇烈的區域——並曾出現 SN 1987A，即現代觀測到的最近的超新星。在南半球天空可用肉眼看到。這裡畫在遠方天幕上，非真實比例。","catalog":"LMC"}, ja:{"type":"伴銀河 · 不規則 · 実スケールではない","distance":"約16万光年","constellation":"かじき座","facts":[["距離","約16万光年"],["擁する","タランチュラ星雲・SN 1987A"]],"desc":"天の川銀河で最大の伴銀河で、すぐ近くを周回する棒状不規則銀河です。局部銀河群で最も激しい星形成領域であるタランチュラ星雲を抱え、現代で観測された最も近い超新星 SN 1987A が現れました。南半球の空では肉眼で見えます。ここでは遠くの天空に描いており、実際のスケールではありません。","catalog":"LMC"}, ko:{"type":"위성 은하 · 불규칙 · 실제 비율 아님","distance":"약 16만 광년","constellation":"황새치자리","facts":[["거리","약 16만 광년"],["보유","타란툴라 성운·SN 1987A"]],"desc":"우리은하에서 가장 큰 위성 은하로, 가까이서 공전하는 막대 불규칙 은하입니다. 국부 은하군에서 별 형성이 가장 격렬한 타란툴라 성운을 품고 있으며, 현대에 관측된 가장 가까운 초신성 SN 1987A가 나타났습니다. 남반구 하늘에서는 맨눈으로 볼 수 있습니다. 여기서는 먼 하늘에 그려져 있으며 실제 비율은 아닙니다.","catalog":"LMC"} } },

        info: { en:{"type":"Dwarf galaxy · satellite · not to scale","distance":"~200,000 light-years","constellation":"Tucana","facts":[["Distance","~200,000 ly"],["Legacy","Leavitt’s Cepheid law"]],"desc":"A dwarf-irregular companion of the Milky Way, paired with its larger sibling as the Magellanic Clouds. By measuring its Cepheid variable stars, Henrietta Leavitt uncovered the period–luminosity law — the first rung of the cosmic distance ladder that let astronomers measure the universe. Drawn on the far sky, not to scale.","catalog":"SMC"}, hans:{"type":"矮星系 · 卫星星系 · 非真实比例","distance":"约 20 万光年","constellation":"杜鹃座","facts":[["距离","约 20 万光年"],["贡献","勒维特造父定律"]],"desc":"银河系的一个不规则矮伴星系，与更大的同伴合称麦哲伦云。亨丽埃塔·勒维特通过测量其中的造父变星，发现了周期—光度关系——这是宇宙距离阶梯的第一级，让天文学家得以测量宇宙。这里画在远方天幕上，非真实比例。","catalog":"SMC"}, hant:{"type":"矮星系 · 衛星星系 · 非真實比例","distance":"約 20 萬光年","constellation":"杜鵑座","facts":[["距離","約 20 萬光年"],["貢獻","勒維特造父定律"]],"desc":"銀河系的一個不規則矮伴星系，與更大的同伴合稱麥哲倫雲。亨麗埃塔·勒維特透過測量其中的造父變星，發現了週期—光度關係——這是宇宙距離階梯的第一級，讓天文學家得以測量宇宙。這裡畫在遠方天幕上，非真實比例。","catalog":"SMC"}, ja:{"type":"矮小銀河 · 衛星銀河 · 実スケールではない","distance":"約20万光年","constellation":"きょしちょう座","facts":[["距離","約20万光年"],["功績","リービットのセファイド則"]],"desc":"天の川銀河の不規則矮小伴銀河で、より大きな兄弟星系とともにマゼラン雲と呼ばれます。ヘンリエッタ・リービットはこの銀河のセファイド変光星を測定し、周期光度関係を発見しました。これは宇宙の距離はしごの最初の一段であり、天文学者が宇宙を測ることを可能にしました。ここでは遠くの天空に描いており、実際のスケールではありません。","catalog":"SMC"}, ko:{"type":"왜소 은하 · 위성 은하 · 실제 비율 아님","distance":"약 20만 광년","constellation":"큰부리새자리","facts":[["거리","약 20만 광년"],["업적","리비트의 세페이드 법칙"]],"desc":"우리은하의 불규칙 왜소 동반 은하로, 더 큰 형제 은하와 함께 마젤란은하로 불립니다. 헨리에타 리비트는 이 은하의 세페이드 변광성을 측정해 주기-광도 관계를 밝혀냈습니다. 이는 천문학자가 우주를 측정하게 해준 우주 거리 사다리의 첫 단입니다. 여기서는 먼 하늘에 그려져 있으며 실제 비율은 아닙니다.","catalog":"SMC"} } }

    });

  }

tellation":"오리온자리","facts":[["지름","태양의 약 700배"],["운명","미래의 초신성"]],"desc":"오리온의 어깨에서 빛나는 붉은 별로, 태양계 안쪽 행성들을 통째로 삼킬 만큼 거대하며 언젠가 초신성으로 폭발할 운명입니다.","catalog":"α Ori"},{"name":"면사포 성운","sub":"","type":"초신성 잔해","distance":"약 2,400광년","constellation":"백조자리","facts":[["나이","약 1만 년"],["형태","필라멘트 모양의 껍질"]],"desc":"약 1만 년 전에 폭발한 초신성이 남긴, 레이스처럼 섬세한 가스 필라멘트입니다.","catalog":"NGC 6960"},{"name":"석호 성운","sub":"","type":"발광 성운","distance":"약 4,100광년","constellation":"궁수자리","facts":[["유형","별 형성 지역"],["목록","M8"]],"desc":"은하 중심 방향에 펼쳐진 광대하고 밝은 별들의 요람입니다.","catalog":"M8"},{"name":"헤르쿨레스 대성단","sub":"","type":"구상 성단","distance":"약 22,000광년","constellation":"헤르쿨레스자리","facts":[["별","약 30만 개"],["나이","약 116억 년"]],"desc":"수십만 개의 늙은 별들이 모여 빛나는 북쪽 하늘의 찬란한 구상 성단입니다.","catalog":"M13"},{"name":"시리우스","sub":"","type":"쌍성","distance":"약 8.6광년","constellation":"큰개자리","facts":[["밝기","밤하늘에서 가장 밝음"],["구성","시리우스 A + B"]],"desc":"지구의 밤하늘에서 가장 밝은 별이자, 우리와 아주 가까운 이웃 별입니다.","catalog":"α CMa"},{"name":"안타레스","sub":"","type":"적색 초거성","distance":"약 550광년","constellation":"전갈자리","facts":[["지름","태양의 약 700배"],["별칭","전갈의 심장"]],"desc":"전갈자리의 심장 자리에서 타오르는 붉은 초거성입니다.","catalog":"α Sco"}] },
    zodiac:  { ja: [{"name":"おひつじ座","dates":"3月21日 – 4月19日","brightest":"ハマル","desc":"おひつじ座は、ギリシャ神話で王子プリクソスを背に乗せて海を渡り救った金毛の牡羊の姿です。その毛皮こそ、イアソンとアルゴ船の英雄たちが探し求めた「金羊毛」でした。約2000年前には春分点がこの星座にあったため、春分点は今も「白羊宮の第一点」と呼ばれています。最も明るい星ハマルは、地球から約66光年離れたオレンジ色の巨星です。"},{"name":"おうし座","dates":"4月20日 – 5月20日","brightest":"アルデバラン","desc":"おうし座は、ゼウスが王女エウロペを背に乗せて海を渡るために変身した牡牛の姿です。燃えるようなオレンジ色に輝く「牡牛の目」は赤色巨星アルデバランで、牛の顔を描くV字形のヒアデス星団の中に位置し、角はエルナトとおうし座ζ星へと伸びています。この星座には有名なプレアデス星団や、1054年に観測された超新星の残骸であるかに星雲もあります。"},{"name":"ふたご座","dates":"5月21日 – 6月21日","brightest":"ポルックス","desc":"ふたご座は、ギリシャ神話の双子の兄弟カストルとポルックスの姿で、片時も離れることのなかったこの英雄たちを、ゼウスが共に天に上げたと伝えられます。最も明るい星ポルックスはわずか34光年先にあるオレンジ色の巨星で、確認済みの系外惑星を持ち、一方のカストルは実は6つの恒星が結びついた珍しい六重連星系です。"},{"name":"かに座","dates":"6月21日 – 7月22日","brightest":"タルフ（かに座β星）","desc":"ギリシャ神話では、かに座はヘラクレスがヒュドラと戦う際、その邪魔をするために女神ヘラが送り込んだ蟹の姿です。踏みつぶされた蟹は、その働きをたたえられて星座になりました。星々は暗いものの、この星座には有名なプレセペ星団（M44）があり、「ロバ」を意味する2つの星、アセルス・ボレアリスとアセルス・アウストラリスの間で、肉眼でも見える数百個の星の群れとして輝いています。"},{"name":"しし座","dates":"7月23日 – 8月22日","brightest":"レグルス","desc":"しし座は、ヘラクレスが十二の功業の最初に絞め殺した不死身の怪物「ネメアの獅子」の姿です。最も明るい星レグルスは「小さな王」を意味し、ほぼ黄道上に位置するため、たびたび月に隠されます。6つの星が裏返しにした「？」の形に並ぶ有名な「ししの大鎌」が、獅子の頭とたてがみを描き出しています。"},{"name":"おとめ座","dates":"8月23日 – 9月22日","brightest":"スピカ","desc":"おとめ座は麦の穂を手にした乙女の姿で、ギリシャ神話では豊穣の女神デメテル、あるいは正義の女神アストライアと同一視されます。最も明るい星スピカは約250光年先にある高温の青白い連星です。さらにこの星座には、約2000個の銀河がひしめくおとめ座銀河団があり、私たちの属する局部超銀河団の中心をなしています。"},{"name":"てんびん座","dates":"9月23日 – 10月22日","brightest":"ズベンエスカマリ","desc":"てんびん座は正義の女神アストライアが手にする天秤の姿で、黄道十二星座の中で唯一、生き物ではないものを表す星座です。2つの明るい星ズベンエルゲヌビとズベンエスカマリの名はアラビア語で「南の爪」「北の爪」を意味し、かつて隣のさそり座の爪とされていた時代の名残です。ズベンエスカマリは、肉眼で見える星としては珍しく、かすかに緑がかって見えると報告されることで知られています。"},{"name":"さそり座","dates":"10月23日 – 11月21日","brightest":"アンタレス","desc":"ギリシャ神話では、さそり座は大地の女神ガイアが傲慢な狩人オリオンを倒すために差し向けたサソリの姿です。神々は2人を天球の正反対に置いたため、両者が同時に空に昇ることはありません。その心臓に輝くアンタレスは直径が太陽の約700倍もある赤色超巨星で、赤い輝きから「火星に対抗するもの」と名付けられました。明るい毒針の星シャウラを先端とする長く曲がった尾は、夏の星空で最もよく知られた姿のひとつです。"},{"name":"いて座","dates":"11月22日 – 12月21日","brightest":"カウス・アウストラリス","desc":"いて座は、隣のさそり座の心臓に向かって弓を引き絞る半人半馬の射手の姿で、クロトス、あるいは賢者ケイロンと同一視されることもあります。この星座は天の川銀河の中心方向にあり、そこには超大質量ブラックホール「いて座A*」が潜んでいます。この星座の8つの明るい星は、有名な「ティーポット」と呼ばれる星の並びを形づくっています。"},{"name":"やぎ座","dates":"12月22日 – 1月19日","brightest":"デネブ・アルゲディ","desc":"やぎ座は「海山羊」とも呼ばれ、牧神パンが怪物テュポンから逃れるためナイル川に飛び込み、下半身が魚の尾に変わった姿とされます。最も明るい星デネブ・アルゲディは山羊の尾の位置にあり、星座は角の星アルゲディとダビーから尾へと続く、矢じりのような輪郭を描きます。1846年に海王星が発見されたのも、このやぎ座の領域でした。"},{"name":"みずがめ座","dates":"1月20日 – 2月18日","brightest":"サダルスウド","desc":"みずがめ座は水瓶を運ぶ者の姿で、ゼウスにオリュンポスへ連れて行かれ、神々に酒を注ぐ給仕となった美少年ガニュメデスを表します。彼の瓶からは絶えず水が注がれ続けています。最も明るい星サダルスウドは珍しい黄色超巨星で、この星座には地球に最も近い惑星状星雲のひとつである「らせん星雲」もあります。"},{"name":"うお座","dates":"2月19日 – 3月20日","brightest":"アルフェルグ（うお座η星）","desc":"ギリシャ神話では、うお座は怪物テュポンから逃れるため、女神アフロディテとその子エロスが2匹の魚に変身し、ひもで互いの体を結んだ姿とされます。西側の魚は「サーキュレット」と呼ばれる小さな星の輪で描かれ、2本のひもは「結び目」を意味する星アルレシャで結ばれています。この星座には春分点もあり、毎年3月に太陽が天の赤道を横切る場所となっています。"}],
               ko: [{"name":"양자리","dates":"3월 21일 – 4월 19일","brightest":"하말","desc":"양자리는 그리스 신화에서 프릭소스 왕자를 태우고 바다를 건너 구해 준 황금 양털의 숫양을 상징하며, 그 양털이 바로 이아손과 아르고호 원정대가 찾아 나선 황금 양털이다. 약 2,000년 전에는 춘분점이 이 별자리 안에 있어 태양이 이곳에서 천구 적도를 지났기에, 그 지점은 지금도 '양자리의 첫 점'이라 불린다. 가장 밝은 별 하말은 지구에서 약 66광년 떨어진 주황색 거성이다."},{"name":"황소자리","dates":"4월 20일 – 5월 20일","brightest":"알데바란","desc":"황소자리는 제우스가 에우로페 공주를 태우고 바다를 건너기 위해 변신한 황소의 모습이다. 불타는 듯한 주황색 눈에 해당하는 알데바란은 적색 거성으로, 황소의 얼굴을 그리는 V자형 히아데스 성단 속에 자리하며 두 뿔은 엘나스와 황소자리 제타별까지 뻗어 있다. 이 별자리에는 유명한 플레이아데스 성단과 1054년에 관측된 초신성의 잔해인 게 성운도 있다."},{"name":"쌍둥이자리","dates":"5월 21일 – 6월 21일","brightest":"폴룩스","desc":"쌍둥이자리는 그리스 신화 속 쌍둥이 형제 카스토르와 폴룩스를 나타내며, 제우스는 늘 붙어 다니던 이 두 영웅을 나란히 하늘에 올렸다. 가장 밝은 별 폴룩스는 불과 34광년 떨어진 주황색 거성으로 확인된 외계 행성을 거느리고 있으며, 카스토르는 실제로 여섯 개의 별이 서로 묶여 있는 놀라운 다중성계다."},{"name":"게자리","dates":"6월 21일 – 7월 22일","brightest":"타르프(게자리 베타)","desc":"그리스 신화에서 게자리는 헤라클레스가 히드라와 싸울 때 헤라가 방해하라고 보낸 게로, 영웅의 발에 밟혀 부서진 뒤 하늘의 별자리가 되었다. 별들은 어둡지만 이 별자리에는 유명한 프레세페 성단(벌집 성단, M44)이 있는데, '당나귀'라 불리는 두 별 아셀루스 보레알리스와 아셀루스 아우스트랄리스 사이에서 맨눈으로도 보이는 수백 개 별의 무리다."},{"name":"사자자리","dates":"7월 23일 – 8월 22일","brightest":"레굴루스","desc":"사자자리는 헤라클레스가 열두 과업 중 첫 번째로 목 졸라 쓰러뜨린 불사신 네메아의 사자를 그린 별자리다. 가장 밝은 별 레굴루스는 '작은 왕'이라는 뜻으로, 거의 정확히 황도 위에 자리해 달에 자주 가려진다. 여섯 개의 별이 좌우가 뒤집힌 물음표 모양을 이루는 유명한 '낫' 성군은 사자의 머리와 갈기를 나타낸다."},{"name":"처녀자리","dates":"8월 23일 – 9월 22일","brightest":"스피카","desc":"처녀자리는 밀 이삭을 든 처녀의 모습으로, 그리스 신화에서는 수확의 여신 데메테르나 정의의 여신 아스트라이아와 동일시된다. 가장 밝은 별 스피카는 약 250광년 떨어진 뜨거운 청백색 쌍성이며, 이 별자리에는 우리 은하가 속한 국부 초은하단의 중심을 이루는 약 2,000개 은하의 무리인 처녀자리 은하단도 자리하고 있다."},{"name":"천칭자리","dates":"9월 23일 – 10월 22일","brightest":"주벤에스카말리","desc":"천칭자리는 정의의 여신 아스트라이아가 든 저울을 나타내며, 황도 12궁 가운데 유일하게 무생물을 상징하는 별자리다. 가장 밝은 두 별 주벤엘게누비와 주벤에스카말리는 각각 '남쪽 집게발'과 '북쪽 집게발'을 뜻하는 아랍어 이름으로, 이 별들이 이웃한 전갈자리의 집게발로 여겨지던 시절을 떠올리게 한다. 주벤에스카말리는 일부 관측자들에게 희미한 초록빛으로 보인다고 전해지는데, 이는 맨눈으로 볼 수 있는 별 가운데 매우 드문 경우로 유명하다."},{"name":"전갈자리","dates":"10월 23일 – 11월 21일","brightest":"안타레스","desc":"그리스 신화에서 전갈자리는 오만한 사냥꾼 오리온을 쓰러뜨리기 위해 가이아가 보낸 전갈로, 신들은 둘을 하늘의 반대편에 두어 결코 함께 보이지 않게 했다. 심장 자리에는 태양 지름의 약 700배에 이르는 적색 초거성 안타레스가 빛나는데, 그 붉은빛 때문에 '화성의 라이벌'이라는 이름을 얻었다. 밝은 독침별 샤울라로 끝나는 길게 굽은 꼬리는 여름 밤하늘에서 가장 알아보기 쉬운 모습 중 하나다."},{"name":"궁수자리","dates":"11월 22일 – 12월 21일","brightest":"카우스 아우스트랄리스","desc":"궁수자리는 이웃한 전갈자리의 심장을 향해 활을 겨눈 반인반마 켄타우로스 궁수로, 흔히 크로토스나 현자 케이론으로 여겨진다. 이 별자리는 초대질량 블랙홀 궁수자리 A*가 자리한 우리은하 중심 방향에 있으며, 밝은 별 여덟 개가 유명한 '찻주전자' 성군을 이룬다."},{"name":"염소자리","dates":"12월 22일 – 1월 19일","brightest":"데네브 알게디","desc":"염소자리는 '바다 염소'로, 괴물 티폰을 피해 나일강에 뛰어들다 하반신이 물고기 꼬리로 변한 목신 판의 모습을 그린 별자리다. 가장 밝은 별 데네브 알게디는 염소의 꼬리를 표시하며, 뿔에 해당하는 알게디와 다비흐에서 꼬리까지 화살촉 모양의 윤곽이 이어진다. 1846년 해왕성이 바로 이 염소자리 영역에서 발견되었다."},{"name":"물병자리","dates":"1월 20일 – 2월 18일","brightest":"사달수드","desc":"물병자리는 제우스가 올림포스로 데려가 신들에게 술을 따르게 한 아름다운 소년 가니메데스를 상징하며, 그는 물병에서 영원히 물을 쏟아붓고 있다. 가장 밝은 별 사달수드는 보기 드문 황색 초거성이고, 이 별자리에는 지구에서 가장 가까운 행성상 성운 중 하나인 나선 성운도 자리하고 있다."},{"name":"물고기자리","dates":"2월 19일 – 3월 20일","brightest":"알페르그(물고기자리 에타)","desc":"그리스 신화에서 물고기자리는 괴물 티폰을 피해 두 마리 물고기로 변신한 뒤 끈으로 서로를 묶은 아프로디테와 아들 에로스의 모습이다. 서쪽 물고기는 '서클릿'이라 불리는 작은 고리 모양의 성군으로 표시되며, 두 끈은 '매듭'을 뜻하는 별 알레샤에서 만난다. 이 별자리에는 태양이 해마다 3월에 천구 적도를 지나는 춘분점도 자리하고 있다."}] }
  };

    { key:"ursa-major",
      t:{"en":"Ursa Major","hans":"大熊座","hant":"大熊座","ja":"おおぐま座","ko":"큰곰자리"},
      stars:[[11.06,61.75,1.79],[11.03,56.38,2.37],[11.9,53.69,2.44],[12.26,57.03,3.31],[12.9,55.96,1.77],[13.4,54.93,2.23],[13.79,49.31,1.86]], starNames:["Dubhe","Merak","Phecda","Megrez","Alioth","Mizar","Alkaid"], lines:[[0,1],[1,2],[2,3],[3,0],[3,4],[4,5],[5,6]],
      info:{ en:{"season":"Spring · Northern Hemisphere (circumpolar)","brightest":"Alioth","desc":"Ursa Major is the Great Bear of Greek myth—the nymph Callisto, whom Zeus placed among the stars. Its seven brightest stars form the Big Dipper, and the two outer stars of the bowl, Dubhe and Merak, point straight to Polaris, the North Star, making it the sky's most famous signpost for finding true north."}, hans:{"season":"春季 · 北半球（拱极星座）","brightest":"玉衡","desc":"大熊座是希腊神话中的大熊——仙女卡利斯托被宙斯化作星辰。它最亮的七颗星组成北斗七星，斗口外侧的天枢与天璇两星连线，直指北极星，自古就是人们辨认北方、寻找方向的最著名指引。"}, hant:{"season":"春季 · 北半球（拱極星座）","brightest":"玉衡","desc":"大熊座是希臘神話中的大熊——仙女卡利斯托被宙斯化作星辰。它最亮的七顆星組成北斗七星，斗口外側的天樞與天璇兩星連線，直指北極星，自古就是人們辨認北方、尋找方向的最著名指引。"}, ja:{"season":"春 · 北半球（周極星）","brightest":"アリオト","desc":"おおぐま座はギリシア神話の大熊——ゼウスによって星にされたニンフ、カリストの姿です。明るい七つの星が北斗七星をかたちづくり、ますの先にある二つの星、ドゥーベとメラクを結んだ線を伸ばすと北極星に至り、北の方角を知る道しるべとして古くから親しまれてきました。"}, ko:{"season":"봄 · 북반구(주극성)","brightest":"알리오트","desc":"큰곰자리는 그리스 신화의 큰 곰으로, 제우스가 하늘에 올린 요정 칼리스토의 모습입니다. 가장 밝은 일곱 별이 북두칠성을 이루며, 국자 바깥쪽 끝의 두베와 메라크 두 별을 이으면 바로 북극성에 닿아, 예로부터 북쪽 방향을 찾는 가장 유명한 길잡이가 되어 왔습니다."} },
      img:"images/cons-ursa-major.jpg", credit:"E. Slawik/NOIRLab/NSF/AURA/M. Zamani" },
    { key:"orion",
      t:{"en":"Orion","hans":"猎户座","hant":"獵戶座","ja":"オリオン座","ko":"오리온자리"},
      stars:[[5.92,7.41,0.42],[5.24,-8.2,0.13],[5.42,6.35,1.64],[5.8,-9.67,2.09],[5.68,-1.94,1.77],[5.6,-1.2,1.69],[5.53,-0.3,2.23]], starNames:["Betelgeuse","Rigel","Bellatrix","Saiph","Alnitak","Alnilam","Mintaka"], lines:[[0,2],[0,4],[2,6],[4,5],[5,6],[4,3],[6,1]],
      info:{ en:{"season":"Winter · equatorial (visible from both hemispheres)","brightest":"Rigel","desc":"Orion is the great hunter of Greek myth, placed among the stars after his death from a scorpion's sting. His famous three-star Belt points down to Sirius, the brightest star in the night sky, making Orion a handy signpost for finding your way around the winter heavens. Just below the Belt hangs the Orion Nebula, a glowing stellar nursery where new stars are being born."}, hans:{"season":"冬季 · 赤道带(南北半球均可见)","brightest":"参宿七","desc":"猎户座是希腊神话中伟大的猎人俄里翁,他被蝎子蜇死后被安置在群星之间。著名的“腰带”三星连成一线,向下指向夜空中最亮的恒星天狼星,是冬季星空中最好用的指路标。腰带下方悬挂着猎户座大星云,那是一处正在孕育新恒星的恒星育婴室。"}, hant:{"season":"冬季 · 赤道帶(南北半球皆可見)","brightest":"參宿七","desc":"獵戶座是希臘神話中偉大的獵人俄里翁,他被蠍子螫死後被安置在群星之間。著名的「腰帶」三星連成一線,向下指向夜空中最亮的恆星天狼星,是冬季星空中最好用的指路標。腰帶下方懸掛著獵戶座大星雲,那是一處正在孕育新恆星的恆星育嬰室。"}, ja:{"season":"冬 · 天の赤道付近(南北両半球で見える)","brightest":"リゲル","desc":"オリオン座はギリシャ神話の偉大な狩人オリオンで、サソリに刺されて死んだ後、星々の間に置かれました。有名な三つ星の「ベルト」は一直線に並び、夜空で最も明るい星シリウスへと導く、冬の星空の便利な道しるべです。ベルトのすぐ下には、新しい星々が生まれつつある輝く星のゆりかご、オリオン大星雲がかかっています。"}, ko:{"season":"겨울 · 천구 적도 부근 (남북 양반구에서 관측 가능)","brightest":"리겔","desc":"오리온자리는 그리스 신화의 위대한 사냥꾼 오리온으로, 전갈에 쏘여 죽은 뒤 별들 사이에 놓였습니다. 나란히 늘어선 세 별로 이루어진 유명한 ‘허리띠’는 밤하늘에서 가장 밝은 별 시리우스를 가리키며, 겨울 밤하늘의 훌륭한 길잡이가 됩니다. 허리띠 바로 아래에는 새로운 별들이 태어나고 있는 빛나는 별의 요람, 오리온 대성운이 걸려 있습니다."} },
      img:"images/cons-orion.jpg", credit:"E. Slawik/NOIRLab/NSF/AURA/M. Zamani" },
    { key:"cassiopeia",
      t:{"en":"Cassiopeia","hans":"仙后座","hant":"仙后座","ja":"カシオペア座","ko":"카시오페이아자리"},
      stars:[[0.153,59.15,2.28],[0.675,56.54,2.24],[0.945,60.72,2.47],[1.43,60.24,2.68],[1.907,63.67,3.35]], starNames:["Caph","Schedar","Gamma Cas","Ruchbah","Segin"], lines:[[0,1],[1,2],[2,3],[3,4]],
      info:{ en:{"season":"Autumn · Northern Hemisphere (circumpolar, visible all year up north)","brightest":"Schedar","desc":"Cassiopeia was the vain queen of Aethiopia in Greek myth, punished by being fixed to her throne in the sky, where she circles the pole upside down for half the year. Her five bright stars trace an unmistakable W (or M) that, sitting opposite the Big Dipper across the North Star, serves as a backup pointer to Polaris. Her brightest star, Schedar, marks the queen's heart."}, hans:{"season":"秋季 · 北半球（拱极星座，北方全年可见）","brightest":"王良四","desc":"仙后座代表希腊神话中高傲的埃塞俄比亚王后，因自负而被罚紧锁在王座上，半年都头朝下地绕北极旋转。它的五颗亮星勾勒出鲜明的 W（或 M）形，与北斗隔着北极星遥遥相对，可作为寻找北极星的另一个指引。其最亮的王良四代表王后的心脏。"}, hant:{"season":"秋季 · 北半球（拱極星座，北方全年可見）","brightest":"王良四","desc":"仙后座代表希臘神話中高傲的埃塞俄比亞王后，因自負而被罰緊鎖在王座上，半年都頭朝下地繞北極旋轉。它的五顆亮星勾勒出鮮明的 W（或 M）形，與北斗隔著北極星遙遙相對，可作為尋找北極星的另一個指引。其最亮的王良四代表王后的心臟。"}, ja:{"season":"秋 · 北半球（周極星、北の地方では一年中見える）","brightest":"シェダル","desc":"カシオペア座は、ギリシア神話で虚栄心の強いエチオピアの妃カシオペアを表し、罰として玉座に縛りつけられ、半年は逆さまに天の北極をまわります。五つの明るい星が描く形は W（または M）に見え、北極星をはさんで北斗七星の反対側に位置するため、北極星を見つけるもう一つの目印になります。最も明るいシェダルは妃の心臓を示します。"}, ko:{"season":"가을 · 북반구(주극성, 북쪽 지방에서는 일 년 내내 보임)","brightest":"쉐다르","desc":"카시오페이아자리는 그리스 신화에서 오만했던 에티오피아의 왕비 카시오페이아를 나타내며, 벌로 왕좌에 묶여 반년 동안 거꾸로 매달려 천구의 북극을 돕니다. 다섯 개의 밝은 별이 그리는 뚜렷한 W(또는 M) 모양은 북극성을 사이에 두고 북두칠성과 마주 보여, 북극성을 찾는 또 하나의 길잡이가 됩니다. 가장 밝은 쉐다르는 왕비의 심장을 나타냅니다."} },
      img:"images/cons-cassiopeia.jpg", credit:"E. Slawik/NOIRLab/NSF/AURA/M. Zamani" },
    { key:"crux",
      t:{"en":"Crux (the Southern Cross)","hans":"南十字座","hant":"南十字座","ja":"みなみじゅうじ座","ko":"남십자자리"},
      stars:[[12.443,-63.1,0.77],[12.795,-59.69,1.25],[12.519,-57.11,1.63],[12.252,-58.75,2.79],[12.357,-60.4,3.59]], starNames:["Acrux","Mimosa","Gacrux","Delta Crucis","Epsilon Crucis"], lines:[[2,0],[3,1],[0,4]],
      info:{ en:{"season":"Autumn · Southern Hemisphere","brightest":"Acrux","desc":"Too far south for the ancient Greeks to see, Crux was once counted as part of the Centaur and was named a constellation of its own by Renaissance navigators. Sailors extend its long arm about four and a half times to locate the south celestial pole, making the cross the great signpost of the southern sky and a familiar emblem on several national flags. Right beside it glitter the colorful Jewel Box star cluster and the inky Coalsack dark nebula."}, hans:{"season":"秋季 · 南半球","brightest":"十字架二","desc":"身处北方的古希腊人从未见过南十字座，它原本只是半人马座的一部分，直到文艺复兴时期才被航海家单独命名成星座。水手把十字的长轴延长约四倍半，就能找到南天极，因此它是南半球夜空最重要的指向标，也出现在好几个国家的国旗上。它旁边还点缀着色彩缤纷的珠宝盒星团和漆黑的煤袋暗星云。"}, hant:{"season":"秋季 · 南半球","brightest":"十字架二","desc":"身處北方的古希臘人從未見過南十字座，它原本只是半人馬座的一部分，直到文藝復興時期才被航海家單獨命名成星座。水手把十字的長軸延長約四倍半，就能找到南天極，因此它是南半球夜空最重要的指向標，也出現在好幾個國家的國旗上。它旁邊還點綴著色彩繽紛的珠寶盒星團與漆黑的煤袋暗星雲。"}, ja:{"season":"秋 · 南半球","brightest":"アクルックス","desc":"北にいた古代ギリシャ人には見えず、みなみじゅうじ座はもともとケンタウルス座の一部で、大航海時代の航海者によって独立した星座となりました。十字の長い軸を約四倍半に伸ばすと天の南極が見つかるため、南天の道しるべとして親しまれ、いくつかの国の国旗にも描かれています。すぐそばには色とりどりの宝石箱星団と、漆黒の石炭袋暗黒星雲が広がっています。"}, ko:{"season":"가을 · 남반구","brightest":"아크룩스","desc":"북쪽에 살던 고대 그리스인은 볼 수 없었던 남십자자리는 본래 센타우루스자리의 일부였으며, 대항해시대 항해자들이 독립된 별자리로 이름 붙였습니다. 십자의 긴 축을 약 네 배 반 늘이면 천구의 남극을 찾을 수 있어 남쪽 하늘의 길잡이로 쓰이며, 여러 나라의 국기에도 그려져 있습니다. 바로 곁에는 화려한 보석상자 성단과 새까만 석탄자루 암흑성운이 자리합니다."} },
      img:"images/cons-crux.jpg", credit:"E. Slawik/NOIRLab/NSF/AURA/M. Zamani" },
    { key:"cygnus",
      t:{"en":"Cygnus","hans":"天鹅座","hant":"天鵝座","ja":"はくちょう座","ko":"백조자리"},
      stars:[[20.690528,45.280339,1.25],[20.370473,40.256679,2.23],[19.512023,27.959681,3.05],[20.77018,33.970256,2.48],[19.749585,45.13081,2.87],[19.4951,51.729778,3.79],[21.215694,30.226924,3.2]], starNames:["Deneb","Sadr","Albireo","Gienah","Delta Cygni","Iota Cygni","Zeta Cygni"], lines:[[0,1],[1,4],[1,3],[1,2],[4,5],[3,6]],
      info:{ en:{"season":"Summer · Northern Hemisphere","brightest":"Deneb","desc":"Cygnus is the swan into which Zeus transformed himself, and in another myth the loyal friend Cycnus who mourned Phaethon along the river Eridanus. Its brightest stars form the Northern Cross, a landmark that stands high overhead on summer evenings. Deneb, the swan's tail, is one corner of the Summer Triangle and among the most luminous stars known to us."}, hans:{"season":"夏季 · 北半球","brightest":"天津四","desc":"天鹅座是宙斯为接近凡间女子而化身的天鹅，也有神话说它是为坠落的法厄同悲伤而化为天鹅的忠诚友人库克诺斯。它最亮的几颗星组成了醒目的“北十字”，在夏夜高悬于头顶。座中最亮的天津四是天鹅的尾羽，也是“夏季大三角”的一角，属于人类已知最明亮的恒星之一。"}, hant:{"season":"夏季 · 北半球","brightest":"天津四","desc":"天鵝座是宙斯為接近凡間女子而化身的天鵝，也有神話說牠是為墜落的法厄同悲傷而化為天鵝的忠誠友人庫克諾斯。牠最亮的幾顆星組成醒目的「北十字」，在夏夜高懸於頭頂。座中最亮的天津四是天鵝的尾羽，也是「夏季大三角」的一角，屬於人類已知最明亮的恆星之一。"}, ja:{"season":"夏 · 北半球","brightest":"デネブ","desc":"はくちょう座は、ゼウスが姿を変えた白鳥、あるいは墜落したパエトーンを悼んで白鳥になった忠実な友キュクノスの姿とされます。明るい星々が「北十字（ノーザンクロス）」を描き、夏の夜空の高くに輝きます。尾にあたるデネブは「夏の大三角」の一角で、宇宙で最も明るい部類の恒星として知られています。"}, ko:{"season":"여름 · 북반구","brightest":"데네브","desc":"백조자리는 제우스가 변신한 백조, 또는 추락한 파에톤을 애도하다 백조가 된 충실한 친구 키크노스의 모습으로 전해집니다. 밝은 별들이 '북십자'를 이루어 여름밤 하늘 높이 빛납니다. 백조의 꼬리에 해당하는 데네브는 '여름의 대삼각형'을 이루는 한 꼭짓점이며, 우주에서 가장 밝은 별 가운데 하나로 알려져 있습니다."} },
      img:"images/cons-cygnus.jpg", credit:"E. Slawik/NOIRLab/NSF/AURA/M. Zamani" },
    { key:"lyra",

      info:{ en:{"season":"Summer · Northern Hemisphere","brightest":"Vega","desc":"Lyra represents the lyre of Orpheus, the legendary musician whose songs could charm all living things and even the gods of the underworld. Its brightest star, Vega, is one of the three stars of the Summer Triangle, an easy pattern for finding your way around the summer sky. Lyra is also home to the famous Ring Nebula, a glowing shell of gas puffed off by a dying star."}, hans:{"season":"夏季 · 北半球","brightest":"织女星","desc":"天琴座代表传说中音乐家俄耳甫斯的琴，他的乐声能打动万物，甚至感化冥界的神。它最亮的星织女星是“夏季大三角”的三颗星之一，是夏夜辨认方向的好帮手。天琴座里还有著名的环状星云，那是一颗垂死恒星抛出的发光气壳。"}, hant:{"season":"夏季 · 北半球","brightest":"織女星","desc":"天琴座代表傳說中音樂家奧菲斯的琴，他的樂聲能打動萬物，甚至感化冥界的神。它最亮的星織女星是「夏季大三角」的三顆星之一，是夏夜辨認方向的好幫手。天琴座裡還有著名的環狀星雲，那是一顆垂死恆星拋出的發光氣殼。"}, ja:{"season":"夏 · 北半球","brightest":"ベガ（織女星）","desc":"こと座は、歌であらゆるものを魅了し、冥界の神さえも動かしたという伝説の音楽家オルフェウスの竪琴（リラ）を表します。最も明るい星ベガ（織女星）は「夏の大三角」をなす三つの星の一つで、夏の夜空で方角をつかむ目印になります。こと座には有名な環状星雲（リング星雲）もあり、これは寿命を終えつつある星が放出したガスの殻です。"}, ko:{"season":"여름 · 북반구","brightest":"직녀성(베가)","desc":"거문고자리는 노래로 모든 생명체를 매혹하고 저승의 신들까지 감동시켰다는 전설적인 음악가 오르페우스의 수금(리라)을 나타냅니다. 가장 밝은 별인 직녀성(베가)은 '여름의 대삼각형'을 이루는 세 별 중 하나로, 여름밤 하늘에서 방향을 찾는 좋은 길잡이가 됩니다. 거문고자리에는 유명한 고리 성운도 있는데, 이는 생을 마감하는 별이 뿜어낸 빛나는 가스 껍질입니다."} },

      info:{ en:{"season":"Summer evenings, best in June · Circumpolar in the Northern Hemisphere","brightest":"Polaris","desc":"In Greek myth, Ursa Minor is the little bear Arcas, son of Callisto, placed in the sky beside his mother (Ursa Major) by Zeus. Its brightest star, Polaris, sits almost exactly at the North Celestial Pole, so it barely moves as the other stars wheel around it. For centuries sailors and travelers found true north simply by locating Polaris at the tip of the Little Dipper's handle."}, hans:{"season":"夏季夜晚，六月最佳 · 北半球拱极星座","brightest":"北极星","desc":"在希腊神话中，小熊座是卡利斯托之子小熊阿卡斯，宙斯将他升上天空，安放在母亲大熊座的身旁。它最亮的恒星北极星几乎正处于天球北极，因此当其他星辰绕它旋转时，它几乎纹丝不动。数百年来，水手和旅人只需在小北斗勺柄末端找到北极星，便能确定正北方向。"}, hant:{"season":"夏季夜晚，六月最佳 · 北半球拱極星座","brightest":"北極星","desc":"在希臘神話中，小熊座是卡利斯托之子小熊阿卡斯，宙斯將他升上天空，安放在母親大熊座的身旁。它最亮的恆星北極星幾乎正處於天球北極，因此當其他星辰繞它旋轉時，它幾乎紋絲不動。數百年來，水手與旅人只需在小北斗杓柄末端找到北極星，便能辨明正北方向。"}, ja:{"season":"夏の宵、6月が見頃 · 北半球の周極星座","brightest":"北極星（ポラリス）","desc":"ギリシャ神話では、こぐま座はカリストの息子である小熊アルカスで、ゼウスが天に上げて母（おおぐま座）のそばに置いた姿とされます。最も明るい星ポラリス（北極星）は天の北極のごく近くにあり、ほかの星がその周りを回っても、ほとんど動きません。そのため何世紀もの間、船乗りや旅人は小北斗の柄の先にある北極星を頼りに真北を知りました。"}, ko:{"season":"여름 저녁, 6월에 가장 좋음 · 북반구 주극 별자리","brightest":"북극성","desc":"그리스 신화에서 작은곰자리는 칼리스토의 아들인 작은 곰 아르카스로, 제우스가 어머니(큰곰자리) 곁에 두려고 하늘로 올린 모습이라 전해집니다. 가장 밝은 별인 북극성은 천구의 북극 가까이에 자리해, 다른 별들이 그 둘레를 도는 동안에도 거의 움직이지 않습니다. 그래서 수백 년 동안 뱃사람과 나그네는 작은 국자 손잡이 끝의 북극성을 찾아 정북 방향을 알아냈습니다."} },

      info:{ en:{"season":"Winter · Southern sky","brightest":"Sirius","desc":"Canis Major is the greater of the two hunting dogs following Orion across the sky, often linked to Laelaps, a mythological hound so swift it always caught its prey. Its brightest star, Sirius, is the most brilliant star in the entire night sky, and its predawn 'heliacal' rising once told the ancient Egyptians that the Nile's annual flood was near. Look just below and to the left of Orion on a winter evening to spot the Dog Star gleaming with a faint blue-white sparkle."}, hans:{"season":"冬季 · 南天","brightest":"天狼星","desc":"大犬座是跟随猎户座奔驰于天际的两只猎犬中较大的一只，常与神话中的猎犬拉埃拉普斯相联系——它奔跑极快，追逐的猎物无一能够逃脱。它最亮的恒星天狼星是整个夜空中最明亮的恒星；在古埃及，天狼星黎明前的偕日升起曾预示着尼罗河一年一度的泛滥即将来临。冬夜里，只要望向猎户座的左下方，就能看到这颗闪着淡淡蓝白光芒的天狼星。"}, hant:{"season":"冬季 · 南天","brightest":"天狼星","desc":"大犬座是跟隨獵戶座奔馳於天際的兩隻獵犬中較大的一隻，常與神話中的獵犬拉埃拉普斯相聯繫——牠奔跑極快，追逐的獵物無一能夠逃脫。牠最亮的恆星天狼星是整個夜空中最明亮的恆星；在古埃及，天狼星黎明前的偕日升起曾預示著尼羅河一年一度的氾濫即將來臨。冬夜裡，只要望向獵戶座的左下方，就能看到這顆閃著淡淡藍白光芒的天狼星。"}, ja:{"season":"冬 · 南天","brightest":"シリウス","desc":"おおいぬ座は、天を駆けるオリオンに従う二匹の猟犬のうち大きいほうで、どんな獲物も逃さない俊足の神話の猟犬ライラプスとしばしば結びつけられます。最も明るい星シリウスは全天で最も輝く恒星で、その夜明け前の出現（ヘリアカル・ライジング）は、かつて古代エジプトでナイル川の氾濫が近いことを告げる目印でした。冬の夕空でオリオンの左下を見れば、青白くきらめくこの「犬の星」を見つけられます。"}, ko:{"season":"겨울 · 남쪽 하늘","brightest":"시리우스","desc":"큰개자리는 하늘을 가로질러 오리온을 뒤따르는 두 마리 사냥개 중 큰 쪽으로, 어떤 사냥감도 놓치지 않을 만큼 빠른 신화 속 사냥개 라일랍스와 자주 연결됩니다. 가장 밝은 별 시리우스는 밤하늘 전체에서 가장 밝게 빛나는 항성으로, 새벽녘 동트기 직전에 떠오르는 '일출 직전 출현(헬리아컬 라이징)'은 고대 이집트에서 나일강의 연례 범람이 다가왔음을 알려 주는 신호였습니다. 겨울 저녁 오리온의 왼쪽 아래를 바라보면 푸른빛이 도는 흰빛으로 반짝이는 이 '개의 별'을 찾을 수 있습니다."} },
