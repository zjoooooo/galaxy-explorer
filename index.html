<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Milky Way Galaxy</title>
<style>
  :root { color-scheme: dark; }
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; background: #03040a; color: #e5e7eb;
    font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif; overflow: hidden;
    user-select: none; -webkit-user-select: none; }
  #cv { display: block; width: 100vw; height: 100vh; }

  .overlay { position: fixed; z-index: 5; }
  #title { top: 14px; left: 18px; font-size: 15px; font-weight: 600; pointer-events: none; }
  #title small { display: block; font-size: 11px; color: #6b7280; font-weight: 400; margin-top: 2px; }
  #msg { top: 50%; left: 50%; transform: translate(-50%,-50%); font-size: 13px; color: #9ca3af; pointer-events: none; }

  /* cinema mode (F): hide all UI chrome */
  body.gx-cinema #title, body.gx-cinema #audio, body.gx-cinema #beacons, body.gx-cinema #lang,
  body.gx-cinema #skyback, body.gx-cinema #skylabels { display: none !important; }

  /* language selector (native <select>, dark) */
  #lang { top: 12px; right: 14px; z-index: 6; font: inherit; font-size: 12px; color: #cbd5e1;
    background: rgba(10,14,24,.72); border: 1px solid #243049; border-radius: 8px; padding: 5px 8px; cursor: pointer; }
  #lang:hover { border-color: #6366f1; }

  /* sky view: back-to-galaxy button */
  #skyback { top: 64px; left: 18px; z-index: 6; display: none; cursor: pointer; font-size: 13px;
    color: #cbd5e1; background: rgba(10,14,24,.72); border: 1px solid #243049; border-radius: 8px; padding: 6px 12px; }
  #skyback:hover { border-color: #6366f1; color: #fff; }
  #skylabels { position: fixed; inset: 0; z-index: 4; pointer-events: none; }
  .skylabel { position: absolute; transform: translate(-50%, -50%); pointer-events: auto; cursor: pointer;
    font-size: 13px; letter-spacing: .08em; color: #cfe0ff; white-space: nowrap; text-align: center;
    text-shadow: 0 1px 3px rgba(0,0,0,.9), 0 0 10px rgba(120,170,255,.45); transition: opacity .2s ease; }
  .skylabel small { display: block; font-size: 10px; color: #8fa3c8; letter-spacing: .12em; }
  .skylabel.dim { opacity: .35; }
  .skylabel.sel { color: #fff; text-shadow: 0 1px 3px rgba(0,0,0,.9), 0 0 14px rgba(150,190,255,.9); }

  /* location beacons: borderless glow-dot + pulse rings + floating label (no boxes, no borders) */
  #beacons { position: fixed; inset: 0; z-index: 4; pointer-events: none; }
  .beacon { position: absolute; --bc: #8fc2ff; text-align: center; transform: translate(-50%, -7px);
    display: flex; flex-direction: column; align-items: center; gap: 6px; }
  .beacon.up { flex-direction: column-reverse; transform: translate(-50%, calc(-100% + 7px)); } /* label above the dot — avoids pile-ups in the crowded solar neighbourhood */
  .b-mark { position: relative; width: 14px; height: 14px; margin: 0 auto; }
  .b-dot { position: absolute; inset: 2px; border-radius: 50%;
    background: radial-gradient(circle, #fff 0%, var(--bc) 55%, transparent 78%);
    box-shadow: 0 0 10px 2px var(--bc); }
  .b-ring { position: absolute; inset: 0; border-radius: 50%; opacity: 0;
    box-shadow: 0 0 6px 1px var(--bc), inset 0 0 6px 1px var(--bc);
    animation: bping 3.2s cubic-bezier(.2, .6, .4, 1) infinite; }
  .b-ring.r2 { animation-delay: 1.6s; }
  @keyframes bping { 0% { transform: scale(.35); opacity: .85; } 75% { opacity: .15; } 100% { transform: scale(3); opacity: 0; } }
  .b-label { font-size: 12px; letter-spacing: .06em; color: #dfeaff; white-space: nowrap;
    text-shadow: 0 1px 3px rgba(0,0,0,.9), 0 0 10px rgba(120,170,255,.5); }
  .b-label small { display: block; font-size: 9.5px; letter-spacing: .05em; color: #93a5c4; margin-top: 1px; }
  .beacon.sun { --bc: #ffd27a; }
  .beacon.sun .b-dot { inset: 1px; }
  .beacon.sun .b-label { color: #ffe9c2; text-shadow: 0 1px 3px rgba(0,0,0,.9), 0 0 12px rgba(255,200,110,.6); }
  .beacon.sun .b-label small { color: #c8ab7d; }
  /* interaction: only the mark + label catch clicks (container stays none) */
  .beacon .b-mark, .beacon .b-label { pointer-events: auto; cursor: pointer; }
  .beacon .b-mark { transition: transform .15s ease; }
  .beacon.dim { opacity: .45; transition: opacity .2s ease; }
  .beacon:hover .b-mark { transform: scale(1.25); }
  .beacon.sel .b-mark { transform: scale(1.5); }
  .beacon.sel .b-dot { box-shadow: 0 0 16px 4px var(--bc); }
  .beacon.sel .b-label { color: #fff; }
  /* label declutter: crowded labels hide (dot + rings stay clickable); they return on zoom-in */
  .beacon .b-label { transition: opacity .25s ease; }
  .beacon.ld .b-label { opacity: 0; pointer-events: none; }
  /* narrow / touch screens: shrink beacons and drop the English subtitle so the
     crowded solar neighbourhood doesn't pile up. ponytail: eases overlap, not a
     full collision solver (that'd need label de-clustering — see task 6). */
  @media (max-width: 640px) {
    .b-mark { width: 11px; height: 11px; }
    .b-label { font-size: 10px; letter-spacing: .02em; }
    .b-label small { display: none; }
  }
  /* beacon info panel — desktop: fixed right side */
  #beacon-panel { top: 74px; right: 14px; width: 300px; max-height: calc(100vh - 96px); overflow-y: auto;
    z-index: 7; background: rgba(10,14,24,.92); border-radius: 12px; padding: 16px 18px 18px;
    color: #e5e7eb; box-shadow: 0 8px 30px rgba(0,0,0,.5); display: none; }
  #beacon-panel.open { display: block; animation: bpIn .18s ease; }
  @keyframes bpIn { from { opacity: 0; transform: translateY(-6px); } to { opacity: 1; transform: none; } }
  #bp-close { position: absolute; top: 8px; right: 10px; background: transparent; border: 0; color: #9ca3af;
    font-size: 20px; line-height: 1; cursor: pointer; padding: 2px 6px; }
  #bp-close:hover { color: #fff; }
  #bp-name { font-size: 18px; font-weight: 600; margin: 0 20px 6px 0; }
  #bp-type { display: inline-block; font-size: 11px; letter-spacing: .04em; padding: 2px 8px; border-radius: 999px;
    background: rgba(255,255,255,.08); color: #cbd5e1; margin-bottom: 10px; }
  .bp-row { display: flex; justify-content: space-between; gap: 12px; font-size: 12.5px; padding: 4px 0;
    border-top: 1px solid rgba(255,255,255,.07); }
  .bp-row .k { color: #93a5c4; } .bp-row .v { color: #e5e7eb; text-align: right; }
  #bp-desc { font-size: 13px; line-height: 1.55; color: #cbd5e1; margin-top: 10px; }
  #bp-cat { font-size: 10.5px; color: #6b7280; margin-top: 10px; }
  #bp-img { display: block; width: 100%; height: 150px; object-fit: cover; border-radius: 8px;
    margin: 10px 0 3px; background: rgba(255,255,255,.04); }
  #bp-credit { font-size: 9px; line-height: 1.35; color: #5b6578; margin-bottom: 6px; }
  #bp-zodiac-link { margin-top: 12px; padding-top: 10px; border-top: 1px solid rgba(255,255,255,.07);
    color: #9cc0ff; cursor: pointer; font-size: 13px; }
  #bp-zodiac-link:hover { color: #cfe2ff; }
  body.gx-cinema #beacon-panel { display: none !important; }
  /* mobile: panel becomes a bottom drawer */
  @media (max-width: 640px) {
    #beacon-panel { top: auto; bottom: 0; right: 0; left: 0; width: auto; max-height: 52vh;
      border-radius: 14px 14px 0 0; padding: 14px 16px 18px; }
    #beacon-panel.open { animation: bpUp .2s ease; }
    @keyframes bpUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: none; } }
  }

  /* background-music control: speaker button + a hover popup listing tracks by name */
  #audio { right: 16px; bottom: 14px; z-index: 6; text-align: right; }
  #audiobtn { display: inline-block; cursor: pointer; font-size: 18px; line-height: 1; background: transparent;
    border: 1px solid transparent; border-radius: 8px; padding: 7px 9px; user-select: none; opacity: .8; }
  #audiobtn:hover { border-color: #6366f1; background: rgba(8,12,22,.6); opacity: 1; }
  #audiolist { display: none; margin-bottom: 6px; background: rgba(10,14,24,.95); border: 1px solid #243049;
    border-radius: 8px; overflow: hidden; }
  #audio:hover #audiolist { display: block; }
  #audiolist .a-track { padding: 6px 12px; font-size: 12px; color: #cbd5e1; cursor: pointer; white-space: nowrap; text-align: left; }
  #audiolist .a-track:hover { background: #161f31; }
  #audiolist .a-track.on { color: #34d399; }
</style>
</head>
<body>
<canvas id="cv"></canvas>

<div id="title" class="overlay">Milky Way Galaxy
  <small>drag to orbit · scroll to zoom · F cinema · M music</small></div>

<select id="lang" class="overlay" title="Language">
  <option value="en">English</option>
  <option value="hans">简体中文</option>
  <option value="hant">繁體中文</option>
  <option value="ja">日本語</option>
  <option value="ko">한국어</option>
</select>

<div id="skyback" class="overlay">← Back to Galaxy</div>

<div id="msg" class="overlay"></div>

<div id="beacon-panel" class="overlay" aria-live="polite">
  <button id="bp-close" title="Close" aria-label="Close">×</button>
  <div id="bp-body"></div>
</div>

<div id="audio" class="overlay">
  <div id="audiolist"></div>
  <div id="audiobtn" title="Background music — click to play / mute (M)">🔇</div>
</div>

<script src="vendor/three.min.js"></script>
<script src="vendor/OrbitControls.js"></script>
<script src="vendor/CopyShader.js"></script>
<script src="vendor/LuminosityHighPassShader.js"></script>
<script src="vendor/EffectComposer.js"></script>
<script src="vendor/RenderPass.js"></script>
<script src="vendor/ShaderPass.js"></script>
<script src="vendor/UnrealBloomPass.js"></script>
<script>
  // ── tunables (tweak to taste, then reload) ──────────────────────────────────
  // BLOOM: gentle selective glow (threshold 0.42 → only bright knots/core glow).
  //        strength 0 = off, ~0.05 subtle, ~0.12 strong.
  // DUST:  the whole spiral galaxy — 85k points on `arms` density-wave arms.
  //        `radius` = disc size, `tight` = winding, `brightness` = overall level.
  // GALAXY_SPIN: radians/sec the whole galaxy rotates about its axis.
  var BLOOM = { strength: 0.08, radius: 0.32, threshold: 0.42 };
  var TONE = { exposure: 1.1 };
  var DUST = { count: 85000, min: 1500, radius: 360, arms: 4, minorDim: 0.42, tight: 0.85, armWidth: 46, randomness: 0.5, thickness: 24, radPow: 0.72, size: 4.0, brightness: 0.5, inside: 0xffcf8a, outside: 0x86acec, hii: 0xff5fa8, blueStar: 0xcfe6ff };
  var GLOW_SIZE = 12, GALAXY_SPIN = 0.013;

  function setMsg(t) { var el = document.getElementById('msg'); if (el) el.textContent = t || ''; }

  // ── renderer / scene / bloom ────────────────────────────────────────────────
  var cv = document.getElementById('cv');
  var renderer = new THREE.WebGLRenderer({ canvas: cv, antialias: true });
  renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.toneMapping = THREE.NoToneMapping; // tone-mapped AFTER bloom via a final ACES pass instead
  var scene = new THREE.Scene();
  scene.fog = new THREE.FogExp2(0x03040a, 0.0012);
  // everything that co-rotates (dust + nebula + effects) lives under this group
  var galaxyRoot = new THREE.Group(); scene.add(galaxyRoot);
  var camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.5, 5000);
  camera.position.set(0, 120, 470); // lower → the disc reads as a steeply-tilted ellipse (3D depth) on load
  var controls = new THREE.OrbitControls(camera, renderer.domElement);
  controls.enableDamping = true; controls.dampingFactor = 0.08; controls.maxDistance = 1600; controls.minDistance = 5;

  // bloom composer (defensive: fall back to plain rendering if any global is missing)
  var composer = null;
  try {
    composer = new THREE.EffectComposer(renderer);
    composer.addPass(new THREE.RenderPass(scene, camera));
    composer.addPass(new THREE.UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), BLOOM.strength, BLOOM.radius, BLOOM.threshold));
    // tone-map AFTER bloom (ACES + gamma) so bright cores compress to colour instead of clipping to white
    composer.addPass(new THREE.ShaderPass({
      uniforms: { tDiffuse: { value: null }, uExposure: { value: TONE.exposure } },
      vertexShader: 'varying vec2 vUv; void main(){ vUv = uv; gl_Position = projectionMatrix * modelViewMatrix * vec4(position,1.0); }',
      fragmentShader: 'uniform sampler2D tDiffuse; uniform float uExposure; varying vec2 vUv;' +
        'vec3 aces(vec3 x){ return clamp((x*(2.51*x+0.03))/(x*(2.43*x+0.59)+0.14), 0.0, 1.0); }' +
        'void main(){ vec3 c = aces(texture2D(tDiffuse, vUv).rgb * uExposure); gl_FragColor = vec4(pow(c, vec3(1.0/2.2)), 1.0); }'
    }));
    composer.setSize(window.innerWidth, window.innerHeight);
  } catch (e) { composer = null; }
  function render() {
    if (composer) composer.render(); else renderer.render(scene, camera);
  }

  // glow point fragment shared by dust + planets
  var GLOW_FRAG = 'varying vec3 vColor; void main(){ float s = pow(max(0.0, 1.0 - distance(gl_PointCoord, vec2(0.5)) * 2.0), 2.0); if (s < 0.02) discard; gl_FragColor = vec4(vColor, s); }';
  // softer GAUSSIAN falloff for the gas — no hard disc edge, so dense points blend into a continuous nebula instead of visible circles

  // ── galactic-dust spiral backdrop (decorative; AUTO-FADES as real data grows) ──
  var dustObj = null, dustBuiltCount = -1;
  function buildDust(count) {
    if (dustObj) { galaxyRoot.remove(dustObj); dustObj.geometry.dispose(); dustObj.material.dispose(); dustObj = null; }
    var N = Math.max(0, count | 0);
    dustBuiltCount = N;
    if (N === 0) return;
    var pos = new Float32Array(N * 3), scl = new Float32Array(N), colA = new Float32Array(N * 3);
    var inside = new THREE.Color(DUST.inside), outside = new THREE.Color(DUST.outside), mix = new THREE.Color();
    // Stars CLUMP into irregular knots/associations along the arms (like the real Milky
    // Way — NOT a smooth uniform field). Seed cluster centres on the (weighted) arms, then
    // drop ~80% of stars as a gaussian blob around a centre + a sparse diffuse field.
    var TAU = 6.28318530718;
    function grand() { return Math.random() + Math.random() + Math.random() - 1.5; } // ~gaussian, range ±1.5
    function pickArm(r) { var idx = (Math.random() < 0.7) ? Math.floor(Math.random() * (DUST.arms / 2)) * 2 : Math.floor(Math.random() * (DUST.arms / 2)) * 2 + 1, maj = (idx % 2 === 0); return { maj: maj, ang: idx * (TAU / DUST.arms) + r * DUST.tight * TAU + (Math.random() - 0.5) * DUST.randomness * (maj ? 1.0 : 1.25) }; }
    var NC = Math.max(20, Math.round(N / 200)), clusters = []; // ~1 cluster per 200 stars
    for (var c = 0; c < NC; c++) {
      var crf = Math.pow(Math.random(), DUST.radPow), cp = pickArm(crf), cR = crf * DUST.radius + (Math.random() - 0.5) * DUST.armWidth;
      clusters.push({ x: Math.cos(cp.ang) * cR, z: Math.sin(cp.ang) * cR, rf: crf, maj: cp.maj, sz: 6 + Math.random() * Math.random() * 36 }); // mostly small knots, a few big associations
    }
    for (var i = 0; i < N; i++) {
      var rf, major;
      if (Math.random() < 0.8) {                                  // ~80% of stars CLUMP into a knot
        var k = clusters[(Math.random() * NC) | 0];
        rf = k.rf; major = k.maj;
        pos[i * 3] = k.x + grand() * k.sz; pos[i * 3 + 2] = k.z + grand() * k.sz;
        pos[i * 3 + 1] = grand() * DUST.thickness * ((1 - rf) + 0.2) * 0.45;
      } else {                                                    // ~20% diffuse field stars between the knots
        rf = Math.pow(Math.random(), DUST.radPow); var fp = pickArm(rf), offR = rf * DUST.radius + (Math.random() - 0.5) * DUST.armWidth;
        major = fp.maj;
        pos[i * 3] = Math.cos(fp.ang) * offR; pos[i * 3 + 2] = Math.sin(fp.ang) * offR;
        pos[i * 3 + 1] = (Math.random() - 0.5) * DUST.thickness * ((1 - rf) + 0.2);
      }
      mix.copy(inside).lerp(outside, Math.min(1, Math.max(0, (rf - 0.12) * 3.0))).multiplyScalar(DUST.brightness * (major ? 1.0 : DUST.minorDim) * (1 - 0.4 * Math.min(1, Math.max(0, (rf - 0.78) * 4.5)))); // blue-white arms (gold only in the inner disc) + minor arms dimmer + dim the outer edge
      scl[i] = (0.3 + Math.random() * 0.9) * (major ? 1.0 : 0.82);
      var kn = Math.random();                                            // scattered YELLOW giants + bright HII (pink) / hot blue-white clusters (HII+blue in the MAJOR arms)
      if (kn < 0.003) { mix.setHex(0xffd45a).multiplyScalar(DUST.brightness * 2.6); scl[i] = 1.4 + Math.random() * 1.2; }                              // bright YELLOW glowing stars (giants / globulars like Palomar 1), scattered everywhere
      else if (major && rf > 0.28 && kn < 0.024) { var cr = Math.random(), col = cr < 0.6 ? 0xff5e30 : (cr < 0.8 ? 0xcfe6ff : 0x4d8cff); mix.setHex(col).multiplyScalar(DUST.brightness * 2.3); scl[i] = 1.2 + Math.random() * 0.9; } // bright knot stars: 60% orange-red, 20% blue-white, 20% blue (was pink HII)
      else if (major && rf > 0.28 && kn < 0.103) { mix.setHex(DUST.blueStar).multiplyScalar(DUST.brightness * 2.0); scl[i] = 0.9 + Math.random() * 0.8; } // hot blue-white clusters
      colA[i * 3] = mix.r; colA[i * 3 + 1] = mix.g; colA[i * 3 + 2] = mix.b;
    }
    var g = new THREE.BufferGeometry();
    g.setAttribute('position', new THREE.BufferAttribute(pos, 3));
    g.setAttribute('aColor', new THREE.BufferAttribute(colA, 3));
    g.setAttribute('aScale', new THREE.BufferAttribute(scl, 1));
    var mat = new THREE.ShaderMaterial({
      uniforms: { uSize: { value: DUST.size * renderer.getPixelRatio() } },
      vertexShader: 'uniform float uSize; attribute float aScale; attribute vec3 aColor; varying vec3 vColor;' +
        'void main(){ vec4 mp = modelMatrix * vec4(position,1.0); vec4 vp = viewMatrix * mp; gl_Position = projectionMatrix * vp;' +
        ' gl_PointSize = uSize * aScale * (300.0 / -vp.z); vColor = aColor; }',
      fragmentShader: GLOW_FRAG,
      transparent: true, depthWrite: false, blending: THREE.AdditiveBlending
    });
    dustObj = new THREE.Points(g, mat); galaxyRoot.add(dustObj); // rotates with the galaxy
  }
  // dustFor: the current dust count, scaled down by the FPS watchdog on weak GPUs.
  function dustFor() { return Math.max(DUST.min, Math.round(DUST.count * perfScale)); }
  buildDust(DUST.count); // full dust on load

  // HII / reflection nebula clouds are now rendered IN the nebulaField shader as
  // gradient-coloured (deep-red ↔ blue-white) COHESIVE regions — no more separate
  // gaussian-point knots (those read as "一个一个小的高斯圆" / individual circles).

  // ── nebula gas as a CONTINUOUS SHADER FIELD (not point sprites) ──────────────
  // A flat disc in the galaxy plane whose fragment shader computes smooth fBm-noise
  // clouds modulated by the spiral — a fluid, water-like nebula that wraps the stars
  // with NO visible circles (point sprites always showed a disc edge). Rides galaxyRoot.
  var NEBULA = { inside: 0xffc878, outside: 0x5f93e8 }; // warm core ↔ cool arm gas colours
  var nebMat = null; // module-scope so the ?tune panel can adjust the glow uniforms live
  (function nebulaField() {
    var geo = new THREE.PlaneGeometry(DUST.radius * 2.6, DUST.radius * 2.6, 1, 1);
    nebMat = new THREE.ShaderMaterial({
      uniforms: {
        uR: { value: DUST.radius }, uArms: { value: DUST.arms }, uTight: { value: DUST.tight },
        uInside: { value: new THREE.Color(NEBULA.inside) }, uOutside: { value: new THREE.Color(NEBULA.outside) },
        uBright: { value: 0.28 }, uMinorDim: { value: DUST.minorDim },
        uCoreExp: { value: 6.0 }, uCoreStr: { value: 1.55 }, uCoreWhite: { value: 0.5 } // operator-tuned defaults
      },
      vertexShader: 'varying vec2 vP; void main(){ vP = position.xy; gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0); }',
      fragmentShader:
        'varying vec2 vP; uniform float uR; uniform float uArms; uniform float uTight; uniform vec3 uInside; uniform vec3 uOutside; uniform float uBright; uniform float uMinorDim; uniform float uCoreExp; uniform float uCoreStr; uniform float uCoreWhite;' +
        'float hash(vec2 p){ return fract(sin(dot(p, vec2(127.1, 311.7))) * 43758.5453); }' +
        'float noise(vec2 p){ vec2 i = floor(p); vec2 f = fract(p); f = f * f * (3.0 - 2.0 * f); return mix(mix(hash(i), hash(i + vec2(1.0, 0.0)), f.x), mix(hash(i + vec2(0.0, 1.0)), hash(i + vec2(1.0, 1.0)), f.x), f.y); }' +
        'float fbm(vec2 p){ float v = 0.0, a = 0.5; for (int k = 0; k < 5; k++){ v += a * noise(p); p = p * 2.0; a *= 0.5; } return v; }' +
        'float worley(vec2 p){ vec2 i = floor(p); vec2 f = fract(p); float md = 1.0; for (int x = -1; x <= 1; x++) for (int y = -1; y <= 1; y++){ vec2 g = vec2(float(x), float(y)); vec2 o = vec2(hash(i + g), hash(i + g + 3.1)); vec2 d = g + o - f; md = min(md, dot(d, d)); } return sqrt(md); }' + // cellular billows (procedural-clouds shape recipe)
        'float remap(float v, float a, float b, float c, float e){ return c + (clamp(v, a, b) - a) / (b - a) * (e - c); }' +
        'void main(){' +
        '  float r = length(vP); float ang = atan(vP.y, vP.x); float nr = r / uR;' +
        '  if (nr > 1.2) discard;' +
        // DOMAIN WARP — two low-freq noise fields bend the arm + the clouds so the perfect
        // spiral MEANDERS and branches (spurs/feathers), not a regular snail shell.
        '  vec2 wp = vP * 0.011;' +
        '  float w1 = fbm(wp);' +
        '  float w2 = fbm(wp + 4.3);' +
        '  float angW = ang + (w1 - 0.5) * 0.85;' + // arm wanders (more irregular now)
        '  float theta = angW - nr * uTight * 6.28318;' + // unwound angle (arms at theta = k*TAU/uArms)
        '  float spiral = cos(uArms * theta);' + // same winding as the dust arms, but warped
        '  float armId = mod(floor(theta * uArms / 6.28318 + 0.5), uArms);' + // which arm this point is in

  function assertZodiacData() {
    if (ZODIAC.length !== 12) throw new Error('need 12 zodiac entries, got ' + ZODIAC.length);
    var langs = ['en', 'hans', 'hant', 'ja', 'ko'];
    ZODIAC.forEach(function (z, zi) {
      if (!z.key || !z.symbol) throw new Error('zodiac ' + zi + ' missing key/symbol');
      langs.forEach(function (L) {
        if (!z.t[L]) throw new Error(z.key + ' missing name ' + L);
        var o = z.info[L];
        if (!o || !o.dates || !o.brightest || !o.desc) throw new Error(z.key + ' missing info.' + L);
      });
      if (z.stars.length < 4) throw new Error(z.key + ' needs >=4 stars');
      if (z.starNames.length !== z.stars.length) throw new Error(z.key + ' starNames length mismatch');
      z.stars.forEach(function (s, si) {
        if (s[0] < 0 || s[0] >= 24) throw new Error(z.key + ' star ' + si + ' RA out of range');
        if (s[1] < -90 || s[1] > 90) throw new Error(z.key + ' star ' + si + ' Dec out of range');
      });
      z.lines.forEach(function (l) {
        if (l[0] >= z.stars.length || l[1] >= z.stars.length || l[0] < 0 || l[1] < 0) throw new Error(z.key + ' line index out of range');
      });
    });
    return true;
  }

               ko: [{"name":"태양계","sub":"현재 위치","type":"항성계","distance":"현재 위치","constellation":"—","facts":[["항성","1개 (태양)"],["행성","8개"]],"desc":"우리의 고향 항성계로, 약 2억 3천만 년에 한 번씩 은하 중심을 공전합니다.","catalog":""},{"name":"궁수자리 A*","sub":"은하 중심","type":"초대질량 블랙홀","distance":"약 26,000광년","constellation":"궁수자리","facts":[["질량","태양의 약 430만 배"]],"desc":"우리은하의 중심에 자리 잡고 은하 전체를 붙들고 있는 초대질량 블랙홀입니다.","catalog":"Sgr A*"},{"name":"오리온 대성운","sub":"","type":"발광 성운","distance":"약 1,340광년","constellation":"오리온자리","facts":[["지름","약 24광년"],["겉보기 등급","4.0"]],"desc":"지구에서 가장 가까운 대형 별 탄생 지역으로, 오리온의 허리띠 아래에서 맨눈으로도 희미하게 볼 수 있습니다.","catalog":"M42"},{"name":"게성운","sub":"","type":"초신성 잔해","distance":"약 6,500광년","constellation":"황소자리","facts":[["초신성","서기 1054년"],["중심핵","게성운 펄서"]],"desc":"서기 1054년에 폭발이 관측된 별의 잔해가 지금도 팽창하고 있으며, 그 중심에는 빠르게 자전하는 중성자별이 있습니다.","catalog":"M1"},{"name":"독수리 성운","sub":"","type":"발광 성운","distance":"약 7,000광년","constellation":"뱀자리","facts":[["명물","창조의 기둥"]],"desc":"높이 솟은 가스 기둥이 허블 우주망원경의 \"창조의 기둥\" 사진으로 유명해진 별 형성 지역입니다.","catalog":"M16"},{"name":"용골자리 성운","sub":"","type":"발광 성운","distance":"약 7,500광년","constellation":"용골자리","facts":[["포함 천체","용골자리 에타"]],"desc":"밤하늘에서 가장 큰 성운 중 하나로, 극도로 불안정하고 질량이 어마어마한 별인 용골자리 에타가 자리하고 있습니다.","catalog":"NGC 3372"},{"name":"백조자리 X-1","sub":"","type":"항성 질량 블랙홀","distance":"약 7,000광년","constellation":"백조자리","facts":[["블랙홀","태양 질량의 약 21배"],["형태","X선 쌍성"]],"desc":"블랙홀로 널리 인정받은 최초의 천체로, 동반성인 청색 초거성에서 가스를 끌어당기고 있습니다.","catalog":"Cyg X-1"},{"name":"플레이아데스 성단","sub":"","type":"산개 성단","distance":"약 440광년","constellation":"황소자리","facts":[["별","1,000개 이상"],["나이","약 1억 년"]],"desc":"맨눈으로도 보이는 \"일곱 자매\" 별들로, 뜨거운 푸른 별들이 아직 반사 성운의 엷은 베일에 싸여 있습니다.","catalog":"M45"},{"name":"오메가 센타우리","sub":"","type":"구상 성단","distance":"약 17,000광년","constellation":"센타우루스자리","facts":[["별","약 1,000만 개"],["특징","우리은하 최대의 구상 성단"]],"desc":"우리은하에서 가장 큰 구상 성단으로, 은하에 삼켜진 왜소은하의 중심핵만 남은 것일 가능성도 있습니다.","catalog":"NGC 5139"},{"name":"베텔게우스","sub":"","type":"적색 초거성","distance":"약 550광년","constellation":"오리온자리","facts":[["지름","태양의 약 700배"],["운명","미래의 초신성"]],"desc":"오리온의 어깨에서 빛나는 붉은 별로, 태양계 안쪽 행성들을 통째로 삼킬 만큼 거대하며 언젠가 초신성으로 폭발할 운명입니다.","catalog":"α Ori"},{"name":"면사포 성운","sub":"","type":"초신성 잔해","distance":"약 2,400광년","constellation":"백조자리","facts":[["나이","약 1만 년"],["형태","필라멘트 모양의 껍질"]],"desc":"약 1만 년 전에 폭발한 초신성이 남긴, 레이스처럼 섬세한 가스 필라멘트입니다.","catalog":"NGC 6960"},{"name":"석호 성운","sub":"","type":"발광 성운","distance":"약 4,100광년","constellation":"궁수자리","facts":[["유형","별 형성 지역"],["목록","M8"]],"desc":"은하 중심 방향에 펼쳐진 광대하고 밝은 별들의 요람입니다.","catalog":"M8"},{"name":"헤르쿨레스 대성단","sub":"","type":"구상 성단","distance":"약 22,000광년","constellation":"헤르쿨레스자리","facts":[["별","약 30만 개"],["나이","약 116억 년"]],"desc":"수십만 개의 늙은 별들이 모여 빛나는 북쪽 하늘의 찬란한 구상 성단입니다.","catalog":"M13"},{"name":"시리우스","sub":"","type":"쌍성","distance":"약 8.6광년","constellation":"큰개자리","facts":[["밝기","밤하늘에서 가장 밝음"],["구성","시리우스 A + B"]],"desc":"지구의 밤하늘에서 가장 밝은 별이자, 우리와 아주 가까운 이웃 별입니다.","catalog":"α CMa"},{"name":"안타레스","sub":"","type":"적색 초거성","distance":"약 550광년","constellation":"전갈자리","facts":[["지름","태양의 약 700배"],["별칭","전갈의 심장"]],"desc":"전갈자리의 심장 자리에서 타오르는 붉은 초거성입니다.","catalog":"α Sco"}] },
    zodiac:  { ja: [{"name":"おひつじ座","dates":"3月21日 – 4月19日","brightest":"ハマル","desc":"おひつじ座は、ギリシャ神話で王子プリクソスを背に乗せて海を渡り救った金毛の牡羊の姿です。その毛皮こそ、イアソンとアルゴ船の英雄たちが探し求めた「金羊毛」でした。約2000年前には春分点がこの星座にあったため、春分点は今も「白羊宮の第一点」と呼ばれています。最も明るい星ハマルは、地球から約66光年離れたオレンジ色の巨星です。"},{"name":"おうし座","dates":"4月20日 – 5月20日","brightest":"アルデバラン","desc":"おうし座は、ゼウスが王女エウロペを背に乗せて海を渡るために変身した牡牛の姿です。燃えるようなオレンジ色に輝く「牡牛の目」は赤色巨星アルデバランで、牛の顔を描くV字形のヒアデス星団の中に位置し、角はエルナトとおうし座ζ星へと伸びています。この星座には有名なプレアデス星団や、1054年に観測された超新星の残骸であるかに星雲もあります。"},{"name":"ふたご座","dates":"5月21日 – 6月21日","brightest":"ポルックス","desc":"ふたご座は、ギリシャ神話の双子の兄弟カストルとポルックスの姿で、片時も離れることのなかったこの英雄たちを、ゼウスが共に天に上げたと伝えられます。最も明るい星ポルックスはわずか34光年先にあるオレンジ色の巨星で、確認済みの系外惑星を持ち、一方のカストルは実は6つの恒星が結びついた珍しい六重連星系です。"},{"name":"かに座","dates":"6月21日 – 7月22日","brightest":"タルフ（かに座β星）","desc":"ギリシャ神話では、かに座はヘラクレスがヒュドラと戦う際、その邪魔をするために女神ヘラが送り込んだ蟹の姿です。踏みつぶされた蟹は、その働きをたたえられて星座になりました。星々は暗いものの、この星座には有名なプレセペ星団（M44）があり、「ロバ」を意味する2つの星、アセルス・ボレアリスとアセルス・アウストラリスの間で、肉眼でも見える数百個の星の群れとして輝いています。"},{"name":"しし座","dates":"7月23日 – 8月22日","brightest":"レグルス","desc":"しし座は、ヘラクレスが十二の功業の最初に絞め殺した不死身の怪物「ネメアの獅子」の姿です。最も明るい星レグルスは「小さな王」を意味し、ほぼ黄道上に位置するため、たびたび月に隠されます。6つの星が裏返しにした「？」の形に並ぶ有名な「ししの大鎌」が、獅子の頭とたてがみを描き出しています。"},{"name":"おとめ座","dates":"8月23日 – 9月22日","brightest":"スピカ","desc":"おとめ座は麦の穂を手にした乙女の姿で、ギリシャ神話では豊穣の女神デメテル、あるいは正義の女神アストライアと同一視されます。最も明るい星スピカは約250光年先にある高温の青白い連星です。さらにこの星座には、約2000個の銀河がひしめくおとめ座銀河団があり、私たちの属する局部超銀河団の中心をなしています。"},{"name":"てんびん座","dates":"9月23日 – 10月22日","brightest":"ズベンエスカマリ","desc":"てんびん座は正義の女神アストライアが手にする天秤の姿で、黄道十二星座の中で唯一、生き物ではないものを表す星座です。2つの明るい星ズベンエルゲヌビとズベンエスカマリの名はアラビア語で「南の爪」「北の爪」を意味し、かつて隣のさそり座の爪とされていた時代の名残です。ズベンエスカマリは、肉眼で見える星としては珍しく、かすかに緑がかって見えると報告されることで知られています。"},{"name":"さそり座","dates":"10月23日 – 11月21日","brightest":"アンタレス","desc":"ギリシャ神話では、さそり座は大地の女神ガイアが傲慢な狩人オリオンを倒すために差し向けたサソリの姿です。神々は2人を天球の正反対に置いたため、両者が同時に空に昇ることはありません。その心臓に輝くアンタレスは直径が太陽の約700倍もある赤色超巨星で、赤い輝きから「火星に対抗するもの」と名付けられました。明るい毒針の星シャウラを先端とする長く曲がった尾は、夏の星空で最もよく知られた姿のひとつです。"},{"name":"いて座","dates":"11月22日 – 12月21日","brightest":"カウス・アウストラリス","desc":"いて座は、隣のさそり座の心臓に向かって弓を引き絞る半人半馬の射手の姿で、クロトス、あるいは賢者ケイロンと同一視されることもあります。この星座は天の川銀河の中心方向にあり、そこには超大質量ブラックホール「いて座A*」が潜んでいます。この星座の8つの明るい星は、有名な「ティーポット」と呼ばれる星の並びを形づくっています。"},{"name":"やぎ座","dates":"12月22日 – 1月19日","brightest":"デネブ・アルゲディ","desc":"やぎ座は「海山羊」とも呼ばれ、牧神パンが怪物テュポンから逃れるためナイル川に飛び込み、下半身が魚の尾に変わった姿とされます。最も明るい星デネブ・アルゲディは山羊の尾の位置にあり、星座は角の星アルゲディとダビーから尾へと続く、矢じりのような輪郭を描きます。1846年に海王星が発見されたのも、このやぎ座の領域でした。"},{"name":"みずがめ座","dates":"1月20日 – 2月18日","brightest":"サダルスウド","desc":"みずがめ座は水瓶を運ぶ者の姿で、ゼウスにオリュンポスへ連れて行かれ、神々に酒を注ぐ給仕となった美少年ガニュメデスを表します。彼の瓶からは絶えず水が注がれ続けています。最も明るい星サダルスウドは珍しい黄色超巨星で、この星座には地球に最も近い惑星状星雲のひとつである「らせん星雲」もあります。"},{"name":"うお座","dates":"2月19日 – 3月20日","brightest":"アルフェルグ（うお座η星）","desc":"ギリシャ神話では、うお座は怪物テュポンから逃れるため、女神アフロディテとその子エロスが2匹の魚に変身し、ひもで互いの体を結んだ姿とされます。西側の魚は「サーキュレット」と呼ばれる小さな星の輪で描かれ、2本のひもは「結び目」を意味する星アルレシャで結ばれています。この星座には春分点もあり、毎年3月に太陽が天の赤道を横切る場所となっています。"}],
               ko: [{"name":"양자리","dates":"3월 21일 – 4월 19일","brightest":"하말","desc":"양자리는 그리스 신화에서 프릭소스 왕자를 태우고 바다를 건너 구해 준 황금 양털의 숫양을 상징하며, 그 양털이 바로 이아손과 아르고호 원정대가 찾아 나선 황금 양털이다. 약 2,000년 전에는 춘분점이 이 별자리 안에 있어 태양이 이곳에서 천구 적도를 지났기에, 그 지점은 지금도 '양자리의 첫 점'이라 불린다. 가장 밝은 별 하말은 지구에서 약 66광년 떨어진 주황색 거성이다."},{"name":"황소자리","dates":"4월 20일 – 5월 20일","brightest":"알데바란","desc":"황소자리는 제우스가 에우로페 공주를 태우고 바다를 건너기 위해 변신한 황소의 모습이다. 불타는 듯한 주황색 눈에 해당하는 알데바란은 적색 거성으로, 황소의 얼굴을 그리는 V자형 히아데스 성단 속에 자리하며 두 뿔은 엘나스와 황소자리 제타별까지 뻗어 있다. 이 별자리에는 유명한 플레이아데스 성단과 1054년에 관측된 초신성의 잔해인 게 성운도 있다."},{"name":"쌍둥이자리","dates":"5월 21일 – 6월 21일","brightest":"폴룩스","desc":"쌍둥이자리는 그리스 신화 속 쌍둥이 형제 카스토르와 폴룩스를 나타내며, 제우스는 늘 붙어 다니던 이 두 영웅을 나란히 하늘에 올렸다. 가장 밝은 별 폴룩스는 불과 34광년 떨어진 주황색 거성으로 확인된 외계 행성을 거느리고 있으며, 카스토르는 실제로 여섯 개의 별이 서로 묶여 있는 놀라운 다중성계다."},{"name":"게자리","dates":"6월 21일 – 7월 22일","brightest":"타르프(게자리 베타)","desc":"그리스 신화에서 게자리는 헤라클레스가 히드라와 싸울 때 헤라가 방해하라고 보낸 게로, 영웅의 발에 밟혀 부서진 뒤 하늘의 별자리가 되었다. 별들은 어둡지만 이 별자리에는 유명한 프레세페 성단(벌집 성단, M44)이 있는데, '당나귀'라 불리는 두 별 아셀루스 보레알리스와 아셀루스 아우스트랄리스 사이에서 맨눈으로도 보이는 수백 개 별의 무리다."},{"name":"사자자리","dates":"7월 23일 – 8월 22일","brightest":"레굴루스","desc":"사자자리는 헤라클레스가 열두 과업 중 첫 번째로 목 졸라 쓰러뜨린 불사신 네메아의 사자를 그린 별자리다. 가장 밝은 별 레굴루스는 '작은 왕'이라는 뜻으로, 거의 정확히 황도 위에 자리해 달에 자주 가려진다. 여섯 개의 별이 좌우가 뒤집힌 물음표 모양을 이루는 유명한 '낫' 성군은 사자의 머리와 갈기를 나타낸다."},{"name":"처녀자리","dates":"8월 23일 – 9월 22일","brightest":"스피카","desc":"처녀자리는 밀 이삭을 든 처녀의 모습으로, 그리스 신화에서는 수확의 여신 데메테르나 정의의 여신 아스트라이아와 동일시된다. 가장 밝은 별 스피카는 약 250광년 떨어진 뜨거운 청백색 쌍성이며, 이 별자리에는 우리 은하가 속한 국부 초은하단의 중심을 이루는 약 2,000개 은하의 무리인 처녀자리 은하단도 자리하고 있다."},{"name":"천칭자리","dates":"9월 23일 – 10월 22일","brightest":"주벤에스카말리","desc":"천칭자리는 정의의 여신 아스트라이아가 든 저울을 나타내며, 황도 12궁 가운데 유일하게 무생물을 상징하는 별자리다. 가장 밝은 두 별 주벤엘게누비와 주벤에스카말리는 각각 '남쪽 집게발'과 '북쪽 집게발'을 뜻하는 아랍어 이름으로, 이 별들이 이웃한 전갈자리의 집게발로 여겨지던 시절을 떠올리게 한다. 주벤에스카말리는 일부 관측자들에게 희미한 초록빛으로 보인다고 전해지는데, 이는 맨눈으로 볼 수 있는 별 가운데 매우 드문 경우로 유명하다."},{"name":"전갈자리","dates":"10월 23일 – 11월 21일","brightest":"안타레스","desc":"그리스 신화에서 전갈자리는 오만한 사냥꾼 오리온을 쓰러뜨리기 위해 가이아가 보낸 전갈로, 신들은 둘을 하늘의 반대편에 두어 결코 함께 보이지 않게 했다. 심장 자리에는 태양 지름의 약 700배에 이르는 적색 초거성 안타레스가 빛나는데, 그 붉은빛 때문에 '화성의 라이벌'이라는 이름을 얻었다. 밝은 독침별 샤울라로 끝나는 길게 굽은 꼬리는 여름 밤하늘에서 가장 알아보기 쉬운 모습 중 하나다."},{"name":"궁수자리","dates":"11월 22일 – 12월 21일","brightest":"카우스 아우스트랄리스","desc":"궁수자리는 이웃한 전갈자리의 심장을 향해 활을 겨눈 반인반마 켄타우로스 궁수로, 흔히 크로토스나 현자 케이론으로 여겨진다. 이 별자리는 초대질량 블랙홀 궁수자리 A*가 자리한 우리은하 중심 방향에 있으며, 밝은 별 여덟 개가 유명한 '찻주전자' 성군을 이룬다."},{"name":"염소자리","dates":"12월 22일 – 1월 19일","brightest":"데네브 알게디","desc":"염소자리는 '바다 염소'로, 괴물 티폰을 피해 나일강에 뛰어들다 하반신이 물고기 꼬리로 변한 목신 판의 모습을 그린 별자리다. 가장 밝은 별 데네브 알게디는 염소의 꼬리를 표시하며, 뿔에 해당하는 알게디와 다비흐에서 꼬리까지 화살촉 모양의 윤곽이 이어진다. 1846년 해왕성이 바로 이 염소자리 영역에서 발견되었다."},{"name":"물병자리","dates":"1월 20일 – 2월 18일","brightest":"사달수드","desc":"물병자리는 제우스가 올림포스로 데려가 신들에게 술을 따르게 한 아름다운 소년 가니메데스를 상징하며, 그는 물병에서 영원히 물을 쏟아붓고 있다. 가장 밝은 별 사달수드는 보기 드문 황색 초거성이고, 이 별자리에는 지구에서 가장 가까운 행성상 성운 중 하나인 나선 성운도 자리하고 있다."},{"name":"물고기자리","dates":"2월 19일 – 3월 20일","brightest":"알페르그(물고기자리 에타)","desc":"그리스 신화에서 물고기자리는 괴물 티폰을 피해 두 마리 물고기로 변신한 뒤 끈으로 서로를 묶은 아프로디테와 아들 에로스의 모습이다. 서쪽 물고기는 '서클릿'이라 불리는 작은 고리 모양의 성군으로 표시되며, 두 끈은 '매듭'을 뜻하는 별 알레샤에서 만난다. 이 별자리에는 태양이 해마다 3월에 천구 적도를 지나는 춘분점도 자리하고 있다."}] }

    var ac = document.createElement('canvas'); ac.width = ac.height = CELLS * CS;
    var g = ac.getContext('2d');
    function rnd(a, b) { return a + Math.random() * (b - a); }
    function hsl(h, s, l, a) { return 'hsla(' + (h | 0) + ',' + (s | 0) + '%,' + (l | 0) + '%,' + a.toFixed(3) + ')'; }
    function paintStamp(cx, cy, force) {
      var type = (force != null) ? force : Math.random();
      g.save(); g.translate(cx, cy); g.rotate(rnd(0, 6.283));
      if (type < 0.32) { // elliptical: smooth warm blob
        var hue = Math.random() < 0.5 ? rnd(20, 45) : rnd(0, 15);
        g.scale(1, rnd(0.45, 0.95));
        var R = rnd(14, 34);
        var gr = g.createRadialGradient(0, 0, 0, 0, 0, R);
        gr.addColorStop(0, hsl(hue, 45, 88, 0.9));
        gr.addColorStop(0.3, hsl(hue, 50, 72, 0.5));
        gr.addColorStop(0.7, hsl(hue, 55, 60, 0.16));
        gr.addColorStop(1, hsl(hue, 55, 55, 0));

      } else if (type < 0.62) { // face-on spiral: core glow + 2-3 dotted arms
        var hue2 = Math.random() < 0.6 ? rnd(200, 230) : rnd(30, 55);
        g.scale(1, rnd(0.55, 1));
        var core = rnd(5, 9);
        var gr2 = g.createRadialGradient(0, 0, 0, 0, 0, core * 2.2);
        gr2.addColorStop(0, hsl(40, 40, 92, 0.95)); gr2.addColorStop(1, hsl(40, 40, 80, 0));
        g.fillStyle = gr2; g.beginPath(); g.arc(0, 0, core * 2.2, 0, 6.283); g.fill();
        var arms = Math.random() < 0.7 ? 2 : 3, tight = rnd(3, 4.6), maxR = rnd(26, 44);
        for (var ai = 0; ai < arms; ai++) {
          for (var s = 0; s < 46; s++) {
            var tt2 = s / 46, ang = ai * 6.283 / arms + tt2 * tight, rr = core + tt2 * (maxR - core);
            g.fillStyle = hsl(hue2, 45, 78, 0.34 * (1 - tt2));

          }

        var hue3 = rnd(25, 50), len = rnd(24, 46);
        var gr3 = g.createLinearGradient(-len, 0, len, 0);
        gr3.addColorStop(0, hsl(hue3, 40, 75, 0)); gr3.addColorStop(0.5, hsl(hue3, 40, 82, 0.7)); gr3.addColorStop(1, hsl(hue3, 40, 75, 0));
        g.save(); g.scale(1, rnd(0.09, 0.16)); g.fillStyle = gr3; g.beginPath(); g.arc(0, 0, len, 0, 6.283); g.fill(); g.restore();
        var gb = g.createRadialGradient(0, 0, 0, 0, 0, len * 0.22);
        gb.addColorStop(0, hsl(hue3, 45, 90, 0.85)); gb.addColorStop(1, hsl(hue3, 45, 80, 0));
        g.save(); g.scale(1, 0.5); g.fillStyle = gb; g.beginPath(); g.arc(0, 0, len * 0.22, 0, 6.283); g.fill(); g.restore();
      } else { // tiny irregular / distant red-or-blue smudge
        var hue4 = Math.random() < 0.5 ? rnd(0, 20) : rnd(190, 230), n2 = 2 + (Math.random() * 3 | 0);
        for (var bi = 0; bi < n2; bi++) {
          var bx2 = rnd(-8, 8), by2 = rnd(-6, 6), br2 = rnd(3, 9);
          var g4 = g.createRadialGradient(bx2, by2, 0, bx2, by2, br2);
          g4.addColorStop(0, hsl(hue4, 50, 78, 0.55)); g4.addColorStop(1, hsl(hue4, 50, 70, 0));
          g.fillStyle = g4; g.beginPath(); g.arc(bx2, by2, br2, 0, 6.283); g.fill();

    }
    function paintDetailedSpiral(cx, cy) { // high-detail stamp for the closer mid-layer
      g.save(); g.translate(cx, cy); g.rotate(rnd(0, 6.283));
      var hue = Math.random() < 0.6 ? rnd(205, 228) : rnd(32, 52);
      g.scale(1, rnd(0.5, 1));
      var haze = g.createRadialGradient(0, 0, 0, 0, 0, 46); // faint disc haze under the arms
      haze.addColorStop(0, hsl(hue, 30, 70, 0.22)); haze.addColorStop(1, hsl(hue, 30, 60, 0));
      g.fillStyle = haze; g.beginPath(); g.arc(0, 0, 46, 0, 6.283); g.fill();
      var core = rnd(5, 8);
      var gc = g.createRadialGradient(0, 0, 0, 0, 0, core * 2.6);
      gc.addColorStop(0, hsl(42, 55, 95, 1)); gc.addColorStop(0.4, hsl(40, 45, 85, 0.55)); gc.addColorStop(1, hsl(40, 45, 80, 0));
      g.fillStyle = gc; g.beginPath(); g.arc(0, 0, core * 2.6, 0, 6.283); g.fill();
      var tight = rnd(3.2, 4.4), maxR = rnd(38, 50);
      for (var ai = 0; ai < 2; ai++) {
        for (var s = 0; s < 90; s++) {
          var tt = s / 90, ang = ai * 3.1416 + tt * tight, rr = core + tt * (maxR - core);
          var axx = Math.cos(ang) * rr, ayy = Math.sin(ang) * rr;
          g.fillStyle = hsl(hue, 50, 80, 0.3 * (1 - tt));
          g.beginPath(); g.arc(axx, ayy, 1 + 3 * (1 - tt), 0, 6.283); g.fill();
          if (Math.random() < 0.3) { // resolved star speckles along the arms
            g.fillStyle = hsl(hue, 30, 92, rnd(0.35, 0.8) * (1 - tt * 0.6));
            g.fillRect(axx + rnd(-3, 3), ayy + rnd(-3, 3), 1, 1);
          }
        }
      }
      g.restore();
    }
    for (var cy2 = 0; cy2 < CELLS; cy2++) for (var cx2 = 0; cx2 < CELLS; cx2++) {
      var ci2 = cy2 * CELLS + cx2, sx2 = cx2 * CS + CS / 2, sy2 = cy2 * CS + CS / 2;
      if (ci2 < 6) paintDetailedSpiral(sx2, sy2);   // cells 0-5: mid-layer showpieces
      else if (ci2 < 16) paintStamp(sx2, sy2, 0.1); // cells 6-15: ellipticals (cluster stock)
      else paintStamp(sx2, sy2);                    // the rest: random mix
    }
    var atlas = new THREE.CanvasTexture(ac);
    function sph(th, ph, r) { return [r * Math.sin(ph) * Math.cos(th), r * Math.cos(ph), r * Math.sin(ph) * Math.sin(th)]; }
    var items = [], clusters = [];
    for (var cc = 0; cc < 3; cc++) clusters.push([rnd(0, 6.283), Math.acos(2 * Math.random() - 1)]);
    for (var gi2 = 0; gi2 < 110; gi2++) { // FAR layer: barely-resolved smudges, mildly grouped
      var th4, ph4;
      if (gi2 % 5 < 2) { var cl = clusters[gi2 % 3]; th4 = cl[0] + rnd(-0.16, 0.16); ph4 = cl[1] + rnd(-0.14, 0.14); }
      else { th4 = rnd(0, 6.283); ph4 = Math.acos(2 * Math.random() - 1); }
      items.push({ p: sph(th4, ph4, rnd(1250, 1650)), size: gi2 < 2 ? rnd(60, 78) : 8 + Math.pow(Math.random(), 2.2) * 46,
        rot: rnd(0, 6.283), cell: (Math.random() * 64) | 0, fade: rnd(0.3, 0.75) });
    }
    for (var mi2 = 0; mi2 < 26; mi2++) { // MID layer: closer, larger, resolvable — prefers the detailed stamps
      items.push({ p: sph(rnd(0, 6.283), Math.acos(2 * Math.random() - 1), rnd(950, 1200)), size: rnd(30, 70),
        rot: rnd(0, 6.283), cell: Math.random() < 0.6 ? (Math.random() * 6) | 0 : (Math.random() * 64) | 0, fade: rnd(0.4, 0.8) });
    }
    // RICH CLUSTER: dozens of ellipticals crowded into one patch of sky (3 giant cD
    // galaxies at the core), like the group in the operator's deep-field reference
    var clTh = rnd(0, 6.283), clPh = Math.acos(2 * Math.random() - 1);
    for (var ki2 = 0; ki2 < 36; ki2++) {
      var tight2 = ki2 < 3 ? 0.018 : 0.085;
      items.push({ p: sph(clTh + rnd(-tight2, tight2) * 2, clPh + rnd(-tight2, tight2) * 1.7, rnd(1300, 1550)),
        size: ki2 < 3 ? rnd(20, 30) : rnd(6, 18), rot: rnd(0, 6.283), cell: 6 + ((Math.random() * 10) | 0), fade: rnd(0.35, 0.7) });
    }
    scene.add(billboardBatch(atlas, items, 8)); // the fixed deep sky — still ONE draw call
    var icl = new THREE.Sprite(new THREE.SpriteMaterial({ map: GLOW_TEX, color: 0xfff0dc, transparent: true, opacity: 0.05, depthWrite: false, blending: THREE.AdditiveBlending }));
    var iclP = sph(clTh, clPh, 1600); icl.position.set(iclP[0], iclP[1], iclP[2]); icl.scale.set(280, 280, 1);
    scene.add(icl); // faint intracluster glow behind the members
  })();

  // shared billboard quad-batch builder — one mesh, one draw call for N textured quads
  // (size / rotation / fade baked per-vertex; used by the deep field and the nebulae)
  function billboardBatch(atlas, items, cellsPerRow) {
    var N = items.length;
    var pos = new Float32Array(N * 4 * 3), corner = new Float32Array(N * 4 * 2), quv = new Float32Array(N * 4 * 2), tintA = new Float32Array(N * 4 * 3), idx = [];
    for (var i = 0; i < N; i++) {
      var it = items[i], cr = Math.cos(it.rot), sr = Math.sin(it.rot);
      var cu = (it.cell % cellsPerRow) / cellsPerRow, cv = Math.floor(it.cell / cellsPerRow) / cellsPerRow;
      for (var vi = 0; vi < 4; vi++) {
        var ox = (vi === 1 || vi === 2) ? 0.5 : -0.5, oy = (vi >= 2) ? 0.5 : -0.5;
        var o3 = (i * 4 + vi) * 3, o2 = (i * 4 + vi) * 2;
        pos[o3] = it.p[0]; pos[o3 + 1] = it.p[1]; pos[o3 + 2] = it.p[2];
        corner[o2] = (ox * cr - oy * sr) * it.size; corner[o2 + 1] = (ox * sr + oy * cr) * it.size;
        quv[o2] = cu + (ox + 0.5) / cellsPerRow; quv[o2 + 1] = cv + (oy + 0.5) / cellsPerRow;
        tintA[o3] = it.fade; tintA[o3 + 1] = it.fade; tintA[o3 + 2] = it.fade;
      }
      var b4 = i * 4; idx.push(b4, b4 + 1, b4 + 2, b4, b4 + 2, b4 + 3);
    }
    var geo = new THREE.BufferGeometry();
    geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
    geo.setAttribute('aCorner', new THREE.BufferAttribute(corner, 2));
    geo.setAttribute('aUv', new THREE.BufferAttribute(quv, 2));
    geo.setAttribute('aTint', new THREE.BufferAttribute(tintA, 3));
    geo.setIndex(idx);
    var mat = new THREE.ShaderMaterial({
      uniforms: { uAtlas: { value: atlas } },
      vertexShader: 'attribute vec2 aCorner; attribute vec2 aUv; attribute vec3 aTint; varying vec2 vUv; varying vec3 vTint;' +
        'void main(){ vec3 cr2 = vec3(viewMatrix[0][0], viewMatrix[1][0], viewMatrix[2][0]);' +
        ' vec3 cu2 = vec3(viewMatrix[0][1], viewMatrix[1][1], viewMatrix[2][1]);' + // camera right/up → billboard
        ' vec3 p = position + cr2 * aCorner.x + cu2 * aCorner.y;' +
        ' gl_Position = projectionMatrix * viewMatrix * vec4(p, 1.0); vUv = aUv; vTint = aTint; }',
      fragmentShader: 'uniform sampler2D uAtlas; varying vec2 vUv; varying vec3 vTint;' +
        'void main(){ vec4 t = texture2D(uAtlas, vUv); if (t.a < 0.01) discard; gl_FragColor = vec4(t.rgb * vTint, t.a); }',

  }

  // ── shared value-noise helpers (used by the great-neighbour painter) ─────────
  function hash01(x, y, seed) { var n = Math.sin(x * 127.1 + y * 311.7 + seed) * 43758.5453; return n - Math.floor(n); }
  function makeFbm(seed) { // 4-octave value-noise fbm (JS twin of the disc-nebula shader's)
    function noise(x, y) {
      var ix = Math.floor(x), iy = Math.floor(y), fx = x - ix, fy = y - iy;
      fx = fx * fx * (3 - 2 * fx); fy = fy * fy * (3 - 2 * fy);
      return hash01(ix, iy, seed) * (1 - fx) * (1 - fy) + hash01(ix + 1, iy, seed) * fx * (1 - fy) + hash01(ix, iy + 1, seed) * (1 - fx) * fy + hash01(ix + 1, iy + 1, seed) * fx * fy;
    }
    return function (x, y) { var v = 0, a = 0.5; for (var k = 0; k < 4; k++) { v += a * noise(x, y); x *= 2; y *= 2; a *= 0.5; } return v; };
  }
  // ── the great neighbour: ONE large Andromeda-style inclined spiral on the far sky.
  // Painted per-pixel at 512px: two flocculent log-spiral arms (fbm-modulated), a
  // dust lane on the near side (dimming, since additive light can only be absent),
  // warm bulge + blue-white disc, resolved star speckles, faint outer halo.
  (function greatNeighbour() {
    function r2(a, b) { return a + Math.random() * (b - a); }
    var S4 = 512, cnv4 = document.createElement('canvas'); cnv4.width = cnv4.height = S4;
    var cx4 = cnv4.getContext('2d');
    var fbmA = makeFbm(7.3), fbmB = makeFbm(41.9);
    var img4 = cx4.createImageData(S4, S4), dd4 = img4.data;
    var SQ = 0.42; // inclination squash
    for (var py4 = 0; py4 < S4; py4++) {
      for (var px4 = 0; px4 < S4; px4++) {
        var ux = px4 / S4 * 2 - 1, uy = py4 / S4 * 2 - 1;
        var env = Math.max(0, 1 - (ux * ux + uy * uy)); // kill the quad edges
        if (env < 0.02) continue;
        var dx = ux / 0.92, dy = uy / (0.92 * SQ);      // disc-plane coords (disc radius ~0.92 of half-size)
        var rr = Math.sqrt(dx * dx + dy * dy), th = Math.atan2(dy, dx);
        var prof = Math.exp(-rr * 2.6) * Math.max(0, Math.min(1, (1.05 - rr) / 0.25)); // radial falloff + clean rim
        var arm = Math.pow(Math.max(0, Math.cos(2 * th - Math.log(Math.max(rr, 0.05)) * 5.5) * 0.5 + 0.5), 1.8);
        arm *= 0.55 + 0.45 * fbmB(dx * 3 + 7, dy * 3 + 2); // flocculent arms
        var dens = (0.3 + 0.8 * arm) * prof;
        var dust = 0;
        if (uy > 0.02 && rr > 0.22 && rr < 0.62) {      // dust lane on the near (lower) side
          dust = Math.sin((rr - 0.22) / 0.4 * 3.1416) * (0.5 + 0.5 * fbmA(dx * 4 + 3, dy * 4 + 11)) * 0.75;
        }
        var bul = Math.exp(-(ux * ux + uy * uy / (SQ * 1.6) / (SQ * 1.6)) * 26); // rounder warm bulge
        var halo = Math.exp(-rr * 1.1) * 0.05;          // faint outer halo
        var a4 = Math.min(1, (dens * (1 - dust) + halo) * 1.15 + bul * 0.9) * env;
        if (a4 <= 0.004) continue;
        var armMix = Math.max(0, Math.min(1, (rr - 0.16) * 3)); // warm centre → blue-white disc
        var R4 = 255 + (172 - 255) * armMix, G4 = 232 + (198 - 232) * armMix, B4 = 205 + (242 - 205) * armMix;
        var vari = 0.86 + 0.28 * fbmB(dx * 2 + 15, dy * 2 + 9);
        var i6 = (py4 * S4 + px4) * 4;
        dd4[i6] = Math.min(255, R4 * vari) | 0; dd4[i6 + 1] = Math.min(255, G4 * vari) | 0; dd4[i6 + 2] = Math.min(255, B4 * vari) | 0;

    cx4.putImageData(img4, 0, 0);

      cx4.fillStyle = 'rgba(225,235,255,' + r2(0.2, 0.75).toFixed(2) + ')';

    }
    var gnTh = r2(0, 6.283), gnPh = r2(0.6, 1.1); // upper-sky corner, away from the disc plane clutter
    var gnR = 1150;
    scene.add(billboardBatch(new THREE.CanvasTexture(cnv4),
      [{ p: [gnR * Math.sin(gnPh) * Math.cos(gnTh), gnR * Math.cos(gnPh), gnR * Math.sin(gnPh) * Math.sin(gnTh)],
         size: 330, rot: r2(0, 6.283), cell: 0, fade: 0.55 }], 1));
  })();

  // ── background music (speaker button / M, autoplays on load): local mp3s in ./audio/,
  // listed by FILE NAME. The speaker toggles play/mute; a hover popup picks the
  // track. Playback starts only on a user gesture (autoplay policy). To add music,
  // drop .mp3 files in ./audio/ and list their file names here. Empty → the speaker
  // button is hidden.
  var MUSIC_TRACKS = ['ambient-space 1.mp3', 'ambient-space 2.mp3', 'the_mountain.mp3'];
  var musicEl = null, musicTrack = -1, musicOn = false;
  var audioBtn = document.getElementById('audiobtn'), audioList = document.getElementById('audiolist');
  if (!MUSIC_TRACKS.length) document.getElementById('audio').style.display = 'none';
  MUSIC_TRACKS.forEach(function (f, i) {
    var d = document.createElement('div'); d.className = 'a-track'; d.textContent = f.replace(/\.mp3$/i, '');
    d.addEventListener('click', function (e) { e.stopPropagation(); musicPlay(i); });
    audioList.appendChild(d);
  });
  function musicPaint() {
    audioBtn.textContent = musicOn ? '🔊' : '🔇';
    Array.prototype.forEach.call(audioList.children, function (c2, i) { c2.classList.toggle('on', i === musicTrack && musicOn); });
  }
  function musicPlay(i) {
    if (!musicEl) { musicEl = new Audio(); musicEl.loop = true; musicEl.volume = 0.35; }
    if (musicTrack !== i) { musicTrack = i; musicEl.src = 'audio/' + encodeURIComponent(MUSIC_TRACKS[i]); }
    musicEl.muted = false; musicOn = true;
    musicEl.play().then(function () { musicRemember('on'); musicPaint(); }).catch(function () { musicOn = false; musicPaint(); });
    musicPaint();
  }
  function musicRemember(state) { try { localStorage.setItem('gx-music', state); } catch (e) {} } // only user-driven states persist (not autoplay blocks)
  function musicToggle() {
    if (!musicEl || musicTrack < 0) { musicPlay(0); return; } // first toggle starts track 1
    if (musicOn) { musicEl.muted = true; musicOn = false; musicRemember('off'); }
    else { musicEl.muted = false; musicOn = true; musicRemember('on'); musicEl.play().catch(function () {}); }
    musicPaint();
  }
  audioBtn.addEventListener('click', musicToggle);

  // autoplay on load; browsers block sound before a user gesture, so if the initial
  // play() is refused, fall back to starting on the first click/key/touch.
  var musicPref = 'on'; try { musicPref = localStorage.getItem('gx-music') || 'on'; } catch (e) {}
  if (MUSIC_TRACKS.length && musicPref !== 'off') { // skip autoplay if the user muted last visit
    musicPlay(0);
    var kickMusic = function () {
      if (musicEl && musicEl.paused) musicPlay(0);
      if (musicEl && !musicEl.paused) ['pointerdown', 'keydown', 'touchstart'].forEach(function (ev) { window.removeEventListener(ev, kickMusic); });
    };
    ['pointerdown', 'keydown', 'touchstart'].forEach(function (ev) { window.addEventListener(ev, kickMusic, { passive: true }); });
  }

  // ── ?fx=1 — demo mode: force one ambient event every 4s (meteor → shower → nova,
  // round-robin) so you can see each effect without waiting for the real schedule.
  // e.g. index.html?fx=1
  var fxDemoSeq = 0;
  if (/[?&]fx/i.test(location.search)) setInterval(function () {
    if (document.hidden) return;
    var s = fxDemoSeq++ % 3;
    if (s === 0) spawnMeteor();
    else if (s === 1) {
      var rn = [Math.random() * 1.2 - 0.6, Math.random() * 0.8 - 0.1];
      var dd = [(Math.random() < 0.5 ? -1 : 1) * (0.5 + Math.random() * 0.3), -(0.35 + Math.random() * 0.3)];
      for (var i = 0; i < 7; i++) spawnMeteor([rn[0] + (Math.random() - 0.5) * 0.5, rn[1] + (Math.random() - 0.5) * 0.35], performance.now() + i * 320, dd);
    }
    else spawnNova();
  }, 4000);

  // keyboard: F cinema (hide UI) · M music (never steals from inputs)
  window.addEventListener('keydown', function (e) {
    var tg = e.target;
    if (tg && (tg.tagName === 'INPUT' || tg.tagName === 'TEXTAREA')) return;
    if (e.altKey || e.ctrlKey || e.metaKey) return;
    var k = (e.key || '').toLowerCase();
    if (k === 'f') toggleCinema();
    else if (k === 'm') musicToggle();
    else if (k === 'escape') toggleCinema(false);
  });

  // ── go ───────────────────────────────────────────────────────────────────────
  startLoop();
</script>
